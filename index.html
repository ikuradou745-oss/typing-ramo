<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイピングゲーム - サービス終了</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-area" id="gameArea">
        <header>
            <div class="header-left">
                <div class="level-display" id="levelDisplay">Lv.1</div>
                <button class="play-btn" id="playBtn">プレイ</button>
            </div>
            <div class="header-right">
                <button class="task-icon" id="taskIcon">📋</button>
                <button class="friend-icon" id="friendIcon">👥</button>
            </div>
        </header>

        <!-- XPバー -->
        <div class="xp-bar-container">
            <div class="xp-bar" id="xpBar" style="width: 0%"></div>
            <span class="xp-text" id="xpText">0/100 XP</span>
        </div>

        <!-- コイン表示（左下固定） -->
        <div class="coin-display" id="coinDisplay">
            <span class="coin-icon">🪙</span>
            <span class="coin-amount" id="coinAmount">0</span>
        </div>

        <!-- メインゲームエリア -->
        <div class="game-main" id="gameMain">
            <!-- サービス終了画面 -->
            <div class="service-end-screen" id="serviceEndScreen">
                <div class="service-end-content">
                    <h1>😢 残念</h1>
                    <p class="service-end-message">サービス終了です。</p>
                    <p class="service-end-bye">ばいばい。</p>
                    <div class="service-end-emoji">👋</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 背景オーバーレイ（使用しないが念のため残す） -->
    <div class="overlay" id="overlay"></div>

    <!-- サイドパネル（使用しないが念のため残す） -->
    <div class="side-panel" id="sidePanel">
        <div class="panel-header">
            <h2>メニュー</h2>
            <span class="close-btn" id="closePanel">&times;</span>
        </div>
        <div class="tabs">
            <div class="tab active" data-tab="profile">プロフィール</div>
            <div class="tab" data-tab="friend">フレンド</div>
        </div>
        <div class="tab-content active" id="profileTab">
            <div class="profile-field">
                <div class="profile-label">名前</div>
                <div class="profile-value" id="profileName">----</div>
            </div>
        </div>
        <div class="tab-content" id="friendTab">
            <p style="color: #888;">サービス終了</p>
        </div>
    </div>

    <!-- タスクパネル（使用しないが念のため残す） -->
    <div class="task-panel" id="taskPanel">
        <div class="panel-header">
            <h2>タスク</h2>
            <span class="close-btn" id="closeTaskPanel">&times;</span>
        </div>
        <p style="padding: 20px; text-align: center;">サービス終了</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
