<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイピングゲーム</title>
    <style>
        /* ===== リセット ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== CSS変数定義 ===== */
        :root {
            --primary-dark: #0a0e27;
            --secondary-dark: #1a1f3a;
            --accent-blue: #00d4ff;
            --accent-green: #00ff88;
            --accent-pink: #ff006e;
            --accent-purple: #7c3aed;
            --text-white: #f0f0f0;
            --text-gray: #a0a0a0;
        }

        /* ===== グローバルスタイル ===== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #1a0033 100%);
            color: var(--text-white);
            overflow: hidden;
            height: 100vh;
        }

        .game-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.1) 0%, transparent 50%);
            position: relative;
        }

        /* ===== ヘッダー ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .game-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .level-display {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(0, 212, 255, 0.1);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .level-display .label {
            font-size: 12px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .level-display .level-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .xp-bar {
            width: 150px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            transition: width 0.3s ease;
        }

        .top-buttons {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            background: rgba(0, 212, 255, 0.05);
            color: var(--accent-blue);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-blue);
            transform: scale(1.05);
        }

        /* ===== コイン表示 ===== */
        .coin-display {
            position: absolute;
            bottom: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 136, 0.1);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            font-size: 18px;
            font-weight: 600;
        }

        .coin-icon {
            font-size: 24px;
        }

        .coin-value {
            color: var(--accent-green);
        }

        /* ===== メインコンテンツエリア ===== */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        /* ===== スクリーン管理 ===== */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .screen.active {
            display: flex;
        }

        /* ===== メニュー画面 ===== */
        .menu-screen {
            gap: 40px;
        }

        .menu-title {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            animation: fadeInDown 0.8s ease;
        }

        .menu-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        .menu-btn {
            padding: 30px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(124, 58, 237, 0.1) 100%);
            color: var(--text-white);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, rgba(124, 58, 237, 0.2) 100%);
            border-color: var(--accent-blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        .menu-btn .icon {
            font-size: 32px;
        }

        /* ===== 難易度選択画面 ===== */
        .difficulty-screen {
            gap: 40px;
        }

        .difficulty-title {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .difficulty-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .difficulty-btn {
            padding: 25px 40px;
            border: 2px solid transparent;
            border-radius: 10px;
            background: rgba(26, 31, 58, 0.5);
            color: var(--text-white);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .difficulty-btn:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-blue);
            transform: scale(1.05);
        }

        .difficulty-btn.easy {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .difficulty-btn.easy:hover {
            background: rgba(0, 255, 136, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .difficulty-btn.normal {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .difficulty-btn.normal:hover {
            background: rgba(0, 212, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .difficulty-btn.hard {
            border-color: var(--accent-pink);
            color: var(--accent-pink);
        }

        .difficulty-btn.hard:hover {
            background: rgba(255, 0, 110, 0.15);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
        }

        /* ===== ゲーム画面 ===== */
        .game-screen {
            gap: 20px;
        }

        .game-stats {
            display: flex;
            gap: 50px;
            margin-bottom: 20px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .timer {
            font-size: 56px;
            font-weight: 800;
            color: var(--accent-pink);
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        .current-question {
            font-size: 48px;
            font-weight: 600;
            color: var(--accent-blue);
            text-align: center;
            min-height: 60px;
            margin: 20px 0;
            max-width: 600px;
            font-family: 'Hiragino Maru Gothic', 'Yu Gothic', serif;
        }

        .romaji-display {
            font-size: 32px;
            color: var(--accent-green);
            font-family: 'Courier New', monospace;
            text-transform: lowercase;
            letter-spacing: 3px;
            margin-top: 10px;
            min-height: 45px;
        }

        .romaji-typed {
            color: var(--accent-blue);
            font-weight: bold;
        }

        .romaji-remaining {
            color: var(--text-gray);
        }

        .input-guide {
            font-size: 14px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ===== ランキングモード ===== */
        .ranking-mode-screen {
            gap: 40px;
        }

        .ranking-mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .ranking-mode-btn {
            padding: 25px 40px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(124, 58, 237, 0.1) 100%);
            color: var(--text-white);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ranking-mode-btn:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, rgba(124, 58, 237, 0.2) 100%);
            border-color: var(--accent-blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        .ranking-mode-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== ランキング表示 ===== */
        .ranking-display-screen {
            gap: 20px;
            overflow-y: auto;
        }

        .ranking-list {
            width: 100%;
            max-width: 600px;
            max-height: 500px;
            overflow-y: auto;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            font-size: 14px;
        }

        .ranking-item:last-child {
            border-bottom: none;
        }

        .ranking-item.my-rank {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 4px;
        }

        .ranking-rank {
            font-weight: 700;
            color: var(--accent-blue);
            min-width: 40px;
        }

        .ranking-name {
            flex: 1;
            color: var(--text-white);
        }

        .ranking-score {
            font-weight: 600;
            color: var(--accent-green);
            min-width: 80px;
            text-align: right;
        }

        /* ===== オーバーレイ ===== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        /* ===== サイドパネル ===== */
        .side-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100%;
            background: linear-gradient(135deg, rgba(26, 31, 58, 0.95) 0%, rgba(10, 14, 39, 0.98) 100%);
            border-left: 1px solid rgba(0, 212, 255, 0.3);
            backdrop-filter: blur(10px);
            overflow-y: auto;
            transition: right 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            padding: 30px 20px;
        }

        .side-panel.active {
            right: 0;
        }

        .panel-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-close {
            background: none;
            border: none;
            color: var(--accent-blue);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .panel-close:hover {
            transform: rotate(90deg);
        }

        .profile-section {
            margin-bottom: 30px;
        }

        .user-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 5px;
        }

        .user-id {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 20px;
        }

        .change-name-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 6px;
            color: var(--text-white);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .change-name-input::placeholder {
            color: var(--text-gray);
        }

        .change-name-btn {
            width: 100%;
            padding: 10px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 6px;
            color: var(--accent-blue);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .change-name-btn:hover {
            background: rgba(0, 212, 255, 0.3);
        }

        .name-change-count {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 15px;
        }

        .friend-code {
            background: rgba(124, 58, 237, 0.2);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(124, 58, 237, 0.5);
            margin-top: 15px;
        }

        .friend-code-label {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .friend-code-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-purple);
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .friend-code-value:hover {
            color: var(--accent-blue);
            transform: scale(1.05);
        }

        .tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-gray);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        .tab-btn:hover {
            color: var(--accent-blue);
        }

        .friends-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .friend-item {
            background: rgba(0, 212, 255, 0.05);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .friend-item:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.4);
        }

        .friend-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .friend-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-green);
        }

        .friend-status.offline {
            background: #ff4444;
        }

        .friend-details {
            flex: 1;
        }

        .friend-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-white);
        }

        .friend-code-small {
            font-size: 12px;
            color: var(--text-gray);
            font-family: 'Courier New', monospace;
        }

        .friend-delete-btn {
            padding: 6px 12px;
            background: rgba(255, 0, 110, 0.2);
            border: 1px solid rgba(255, 0, 110, 0.5);
            border-radius: 4px;
            color: var(--accent-pink);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .friend-delete-btn:hover {
            background: rgba(255, 0, 110, 0.3);
        }

        .add-friend-section {
            margin-bottom: 20px;
        }

        .add-friend-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 6px;
            color: var(--text-white);
            font-size: 14px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }

        .add-friend-input::placeholder {
            color: var(--text-gray);
        }

        .add-friend-btn {
            width: 100%;
            padding: 10px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 6px;
            color: var(--accent-blue);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .add-friend-btn:hover {
            background: rgba(0, 212, 255, 0.3);
        }

        .task-item {
            background: rgba(0, 212, 255, 0.05);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            margin-bottom: 12px;
        }

        .task-item.completed {
            background: rgba(0, 255, 136, 0.05);
            border-color: rgba(0, 255, 136, 0.3);
        }

        .task-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 8px;
        }

        .task-progress {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .task-progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .task-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            transition: width 0.3s ease;
        }

        .task-reward {
            margin-top: 8px;
            font-size: 12px;
            color: var(--accent-green);
            font-weight: 600;
        }

        /* ===== アニメーション ===== */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes levelUp {
            0% {
                opacity: 0;
                transform: translateY(-50px);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100px);
            }
        }

        .level-up-notification {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: 700;
            animation: levelUp 3s ease-out forwards;
            z-index: 2000;
            pointer-events: none;
        }

        /* ===== レスポンシブ対応 ===== */
        @media (max-width: 768px) {
            .menu-buttons {
                grid-template-columns: 1fr;
            }

            .side-panel {
                width: 100%;
                right: -100%;
            }

            .header {
                flex-direction: column;
                padding: 15px;
            }

            .menu-title {
                font-size: 32px;
            }
        }

        .hidden {
            display: none !important;
        }

        /* ===== スクロールバーカスタマイズ ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 212, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.5);
        }

        /* ===== 戻るボタン ===== */
        .back-btn {
            padding: 12px 24px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            background: rgba(0, 212, 255, 0.05);
            color: var(--accent-blue);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- ===== ヘッダー ===== -->
        <div class="header">
            <div class="header-left">
                <div class="game-title">⚡ TYPING</div>
            </div>
            <div class="header-right">
                <div class="level-display">

    <script>
        /* ========================================
           グローバル状態管理
           ========================================
           ゲーム全体の状態を保持するオブジェクト
           localStorage に保存して永続化される
        */
        const gameState = {
            // プレイヤー情報
            userId: null,
            userName: 'User',
            friendCode: '',
            coins: 0,
            level: 1,
            xp: 0,
            maxXp: 100,
            
            // 日次リセット関連
            nameChangeCount: 0,
            lastNameChangeReset: new Date().toDateString(),
            
            // フレンド・ゲーム進行
            friends: [],
            currentScore: 0,
            currentCombo: 0,
            gameActive: false,
            gameTime: 60,
            currentDifficulty: null,
            currentRankingMode: null,
            lastRankingRewardDate: new Date().toDateString(),
            
            // タスク
            dailyTasks: [
                { id: 'play10', title: '10回タイピングをプレイ', current: 0, target: 10, reward: { xp: 50, coins: 1500 }, completed: false },
                { id: 'score5k', title: 'スコア5000～50000を叩き出す', current: 0, target: 1, reward: { xp: 50, coins: 1500 }, completed: false },
                { id: 'combo50', title: 'コンボ50～150を叩き出す', current: 0, target: 1, reward: { xp: 50, coins: 1500 }, completed: false }
            ],
            weeklyTasks: [
                { id: 'play100', title: '100回タイピングをプレイ', current: 0, target: 100, reward: { xp: 500, coins: 15000 }, completed: false },
                { id: 'score10x', title: 'スコア500～50000を10回叩き出す', current: 0, target: 10, reward: { xp: 500, coins: 15000 }, completed: false },
                { id: 'comboWeekly', title: 'コンボ50～150を叩き出す', current: 0, target: 1, reward: { xp: 500, coins: 15000 }, completed: false }
            ]
        };

        /* ========================================
           問題データベース
           ========================================
           初級・中級・上級の各20問
        */
        const questions = {
            easy: [
                'そら', 'うみ', 'えがお', 'へいわ', 'きずな', 'きぼう', 'ひかり', 'かぜ', 'みらい', 'じゆう',
                'ゆうき', 'かんしゃ', 'とけい', 'たいよう', 'けしき', 'まほう', 'こきゅう', 'ほうせき', 'きおく', 'ぼうけん'
            ],
            normal: [
                'いっしょうけんめい', 'しこうさくご', 'せっさたくま', 'おんこちしん', 'いちごいちえ',
                'しんきいってん', 'りんきおうへん', 'としょかん', 'しんかんせん', 'すいへいせん',
                'てんたいかんそく', 'しんりんよく', 'りょうりきょうしつ', 'しょくぶつえん', 'はくぶつかん',
                'うちゅうひこうし', 'つうしんきょういく', 'ちきゅうおんだんか', 'じこしょうかい', 'こうきょうしせつ'
            ],
            hard: [
                'ごんごどうだん', 'こうとうむけい', 'いしんでんしん', 'ひゃっかりょうらん', 'しめんそか',
                'がしんしょうたん', 'ゆうずうむげ', 'せいれんけっぱく', 'あんちゅうもさく', 'でんぱぼうえんきょう',
                'さんぎょうかくめい', 'しゅうぎいんぎいん', 'こくりつきょうぎじょう', 'せいしんほけんしてい', 'じんこうちのうかいはつ',
                'ふろうふし', 'せいぶつたようせい', 'じぞくかのうせい', 'ひはかいけんさ', 'ぎむきょういくしょがっこう',
                'しんらばんしょう'
            ]
        };

        /* ========================================
           ローマ字マッピング
           ========================================
           ひらがなをローマ字に変換するための辞書
        */
        const romajiMap = {
            'あ': 'a', 'い': 'i', 'う': 'u', 'え': 'e', 'お': 'o',
            'か': 'ka', 'き': 'ki', 'く': 'ku', 'け': 'ke', 'こ': 'ko',
            'が': 'ga', 'ぎ': 'gi', 'ぐ': 'gu', 'げ': 'ge', 'ご': 'go',
            'さ': 'sa', 'し': 'si', 'す': 'su', 'せ': 'se', 'そ': 'so',
            'ざ': 'za', 'じ': 'zi', 'ず': 'zu', 'ぜ': 'ze', 'ぞ': 'zo',
            'た': 'ta', 'ち': 'ti', 'つ': 'tu', 'て': 'te', 'と': 'to',
            'だ': 'da', 'ぢ': 'di', 'づ': 'du', 'で': 'de', 'ど': 'do',
            'な': 'na', 'に': 'ni', 'ぬ': 'nu', 'ね': 'ne', 'の': 'no',
            'は': 'ha', 'ひ': 'hi', 'ふ': 'fu', 'へ': 'he', 'ほ': 'ho',
            'ば': 'ba', 'び': 'bi', 'ぶ': 'bu', 'べ': 'be', 'ぼ': 'bo',
            'ぱ': 'pa', 'ぴ': 'pi', 'ぷ': 'pu', 'ぺ': 'pe', 'ぽ': 'po',
            'ま': 'ma', 'み': 'mi', 'む': 'mu', 'め': 'me', 'も': 'mo',
            'や': 'ya', 'ゆ': 'yu', 'よ': 'yo',
            'ら': 'ra', 'り': 'ri', 'る': 'ru', 'れ': 're', 'ろ': 'ro',
            'わ': 'wa', 'を': 'wo', 'ん': 'nn',
            'ぁ': 'la', 'ぃ': 'li', 'ぅ': 'lu', 'ぇ': 'le', 'ぉ': 'lo',
            'っ': 'xtu'
        };

        /* ========================================
           拗音マッピング
           ========================================
           複合音（きゃ、しゅ など）の変換
        */
        const youonMap = {
            'きゃ': 'kya', 'きゅ': 'kyu', 'きょ': 'kyo',
            'しゃ': 'sya', 'しゅ': 'syu', 'しょ': 'syo',
            'ちゃ': 'tya', 'ちゅ': 'tyu', 'ちょ': 'tyo',
            'にゃ': 'nya', 'にゅ': 'nyu', 'にょ': 'nyo',
            'ひゃ': 'hya', 'ひゅ': 'hyu', 'ひょ': 'hyo',
            'みゃ': 'mya', 'みゅ': 'myu', 'みょ': 'myo',
            'りゃ': 'rya', 'りゅ': 'ryu', 'りょ': 'ryo',
            'ぎゃ': 'gya', 'ぎゅ': 'gyu', 'ぎょ': 'gyo',
            'じゃ': 'zya', 'じゅ': 'zyu', 'じょ': 'zyo',
            'びゃ': 'bya', 'びゅ': 'byu', 'びょ': 'byo',
            'ぴゃ': 'pya', 'ぴゅ': 'pyu', 'ぴょ': 'pyo'
        };

        /* ========================================
           ユーティリティ関数
           ========================================
        */

        // ランダムID生成（ユーザーID用）
        function generateRandomId() {
            return Math.random().toString(36).substr(2, 12).toUpperCase();
        }

        // フレンドコード生成（数字6桁+大文字3字）
        function generateFriendCode() {
            const numbers = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
            const letters = Math.random().toString(36).substr(2, 3).toUpperCase();
            return numbers + letters;
        }

        /* ========================================
           ローマ字変換関数（最重要）
           ========================================
           ひらがなテキストをローマ字に変換する
           促音（っ）の処理：
             例）「がっこう」→ が(ga) + っこ(kko) + う(u) = gakkou
             つまり促音の次の文字の子音を2回出力
        */
        function convertToRomaji(text) {
            let result = '';
            let i = 0;
            
            while (i < text.length) {
                // 促音（っ）の処理
                if (text[i] === 'っ' && i + 1 < text.length) {
                    const nextChar = text[i + 1];
                    let nextRomaji = '';
                    
                    // 2文字の拗音をチェック（例：きゃ、しゅ など）
                    if (i + 2 < text.length) {
                        const twoChar = text.substring(i + 1, i + 3);
                        if (youonMap[twoChar]) {
                            nextRomaji = youonMap[twoChar];
                        }
                    }
                    
                    // 1文字の場合
                    if (!nextRomaji) {
                        nextRomaji = romajiMap[nextChar] || nextChar;
                    }
                    
                    // 子音を2回 + その文字のロマ字全体を出す
                    // 例：ko → kko
                    if (nextRomaji) {
                        result += nextRomaji[0] + nextRomaji[0] + nextRomaji.substring(1);
                    }
                    
                    // 促音と次の文字をスキップ
                    i += 2;
                    continue;
                }
                
                // 2文字の拗音をチェック
                if (i + 1 < text.length) {
                    const twoChar = text.substring(i, i + 2);
                    if (youonMap[twoChar]) {
                        result += youonMap[twoChar];
                        i += 2;
                        continue;
                    }
                }
                
                // 1文字をチェック
                const char = text[i];
                result += romajiMap[char] || char;
                i++;
            }
            
            return result;
        }

        // ゲーム状態を localStorage に保存
        function saveGameState() {
            localStorage.setItem('gameState', JSON.stringify(gameState));
            saveRankingData();
        }

        // localStorage からゲーム状態を読み込み
        function loadGameState() {
            const saved = localStorage.getItem('gameState');
            if (saved) {
                Object.assign(gameState, JSON.parse(saved));
            } else {
                // 初回プレイ時
                gameState.userId = generateRandomId();
                gameState.friendCode = generateFriendCode();
                saveGameState();
            }
            checkDailyReward();
        }

        // 日次リセット（名前変更回数とタスク）
        function checkAndResetDaily() {
            const today = new Date().toDateString();
            if (gameState.lastNameChangeReset !== today) {
                gameState.lastNameChangeReset = today;
                gameState.nameChangeCount = 0;
                gameState.dailyTasks.forEach(task => task.completed = false);
                saveGameState();
            }
        }

        /* ========================================
           ランキングデータ管理
           ========================================
        */

        function getRankingKey(mode) {
            return `ranking_${mode}`;
        }

        function saveRankingData() {
            const friendRanking = JSON.parse(localStorage.getItem(getRankingKey('friend')) || '[]');
            const worldRanking = JSON.parse(localStorage.getItem(getRankingKey('world')) || '[]');
            localStorage.setItem(getRankingKey('friend'), JSON.stringify(friendRanking));
            localStorage.setItem(getRankingKey('world'), JSON.stringify(worldRanking));
        }

        // スコアをランキングに追加
        function addScoreToRanking(mode, score) {
            const key = getRankingKey(mode);
            let ranking = JSON.parse(localStorage.getItem(key) || '[]');
            
            ranking.push({
                name: gameState.userName,
                score: score,
                userId: gameState.userId,
                date: new Date().toISOString()
            });
            
            // スコア降順でソート
            ranking.sort((a, b) => b.score - a.score);
            
            // 上位100位のみ保持
            ranking = ranking.slice(0, 100);
            
            localStorage.setItem(key, JSON.stringify(ranking));
        }

        function getRanking(mode) {
            const key = getRankingKey(mode);
            return JSON.parse(localStorage.getItem(key) || '[]');
        }

        function getWorldRankingParticipantCount() {
            return getRanking('world').length;
        }

        // 毎日朝7時の報酬配付をチェック
        function checkDailyReward() {
            const today = new Date();
            const sevenAM = new Date();
            sevenAM.setHours(7, 0, 0, 0);
            
            const lastRewardDate = new Date(gameState.lastRankingRewardDate);
            const lastRewardDay = lastRewardDate.toDateString();
            const todayString = today.toDateString();
            
            // 新しい日で朝7時以降なら報酬を配付
            if (todayString !== lastRewardDay && today >= sevenAM) {
                giveRankingRewards();
                gameState.lastRankingRewardDate = todayString;
                saveGameState();
            }
        }

        // ランキング報酬配付（朝7時）
        function giveRankingRewards() {
            const friendRanking = getRanking('friend');
            const worldRanking = getRanking('world');
            const participantCount = getWorldRankingParticipantCount();
            
            // フレンドランキングの報酬
            friendRanking.forEach((entry, index) => {
                if (entry.userId === gameState.userId) {
                    if (index === 0) {
                        gameState.xp += 50;
                        gameState.coins += 1500;
                    } else if (index >= 1 && index <= 2) {
                        gameState.xp += 25;
                        gameState.coins += 500;
                    }
                }
            });
            
            // ワールドランキングの報酬
            worldRanking.forEach((entry, index) => {
                if (entry.userId === gameState.userId) {
                    if (index === 0) {
                        gameState.xp += 50 * participantCount;
                        gameState.coins += 700 * participantCount;
                    } else if (index >= 1 && index <= 2) {
                        gameState.xp += 25 * participantCount;
                        gameState.coins += 500 * participantCount;
                    } else if (index >= 3 && index <= 4) {
                        gameState.xp += 10 * participantCount;
                        gameState.coins += 300 * participantCount;
                    }
                }
            });
            
            saveGameState();
        }

        /* ========================================
           UI更新関数
           ========================================
        */

        function updateUI() {
            document.getElementById('levelDisplay').textContent = gameState.level;
            const xpPercent = (gameState.xp / gameState.maxXp) * 100;
            document.getElementById('xpBarFill').style.width = xpPercent + '%';
            document.getElementById('coinDisplay').textContent = gameState.coins;
            document.getElementById('displayName').textContent = gameState.userName;
            document.getElementById('userId').textContent = 'ID: ' + gameState.userId;
            document.getElementById('friendCodeDisplay').textContent = gameState.friendCode;
            document.getElementById('nameChangeCount').textContent = `本日の変更回数: ${gameState.nameChangeCount}/3`;
            document.getElementById('newNameInput').value = '';

            updateFriendsList();
            updateTasksDisplay();
            
            // フレンドランキングボタンの有効/無効制御
            const friendRankingBtn = document.getElementById('friendRankingBtn');
            if (gameState.friends.length < 2) {
                friendRankingBtn.disabled = true;
                friendRankingBtn.title = 'フレンドが2人以上必要です';
            } else {
                friendRankingBtn.disabled = false;
                friendRankingBtn.title = '';
            }
        }

        function updateFriendsList() {
            const friendsList = document.getElementById('friendsList');
            friendsList.innerHTML = '';

            if (gameState.friends.length === 0) {
                friendsList.innerHTML = '<div style="text-align: center; color: var(--text-gray);">フレンドがいません</div>';
                return;
            }

            gameState.friends.forEach(friend => {
                const friendEl = document.createElement('div');
                friendEl.className = 'friend-item';
                friendEl.innerHTML = `
                    <div class="friend-info">
                        <div class="friend-status ${friend.online ? '' : 'offline'}"></div>
                        <div class="friend-details">
                            <div class="friend-name">${friend.name}</div>
                            <div class="friend-code-small">${friend.code}</div>
                        </div>
                    </div>
                    <button class="friend-delete-btn">削除</button>
                `;
                const deleteBtn = friendEl.querySelector('.friend-delete-btn');
                deleteBtn.addEventListener('click', function() {
                    gameState.friends = gameState.friends.filter(f => f.code !== friend.code);
                    saveGameState();
                    updateFriendsList();
                    updateUI();
                });
                friendsList.appendChild(friendEl);
            });
        }

        function updateTasksDisplay() {
            const dailyList = document.getElementById('dailyTasksList');
            dailyList.innerHTML = '';
            gameState.dailyTasks.forEach(task => {
                const taskEl = document.createElement('div');
                taskEl.className = `task-item ${task.completed ? 'completed' : ''}`;
                const percent = Math.min(100, (task.current / task.target) * 100);
                taskEl.innerHTML = `
                    <div class="task-title">${task.title}</div>
                    <div class="task-progress">${task.current} / ${task.target}</div>
                    <div class="task-progress-bar">
                        <div class="task-progress-fill" style="width: ${percent}%"></div>
                    </div>
                    <div class="task-reward">報酬: +${task.reward.xp}⭐ +${task.reward.coins}💰</div>
                `;
                dailyList.appendChild(taskEl);
            });

            const weeklyList = document.getElementById('weeklyTasksList');
            weeklyList.innerHTML = '';
            gameState.weeklyTasks.forEach(task => {
                const taskEl = document.createElement('div');
                taskEl.className = `task-item ${task.completed ? 'completed' : ''}`;
                const percent = Math.min(100, (task.current / task.target) * 100);
                taskEl.innerHTML = `
                    <div class="task-title">${task.title}</div>
                    <div class="task-progress">${task.current} / ${task.target}</div>
                    <div class="task-progress-bar">
                        <div class="task-progress-fill" style="width: ${percent}%"></div>
                    </div>
                    <div class="task-reward">報酬: +${task.reward.xp}⭐ +${task.reward.coins}💰</div>
                `;
                weeklyList.appendChild(taskEl);
            });
        }

        // 画面切り替え
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // 通知表示
        function showNotification(message, type = 'level-up') {
            const notification = document.createElement('div');
            notification.className = `${type}-notification`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // XP加算＆レベルアップ処理
        function addXP(amount) {
            gameState.xp += amount;
            
            while (gameState.xp >= gameState.maxXp) {
                gameState.xp -= gameState.maxXp;
                gameState.level++;
                gameState.maxXp = Math.floor(gameState.maxXp * 1.5);
                showNotification(`🎉 レベルアップ！ 現在のレベル: ${gameState.level}`, 'level-up');
            }
            
            saveGameState();
            updateUI();
        }

        /* ========================================
           パネル制御
           ========================================
        */

        function openPanel(panelType) {
            const overlay = document.getElementById('overlay');
            const panel = document.getElementById('sidePanel');
            const profilePanel = document.getElementById('profilePanel');
            const friendPanel = document.getElementById('friendPanel');
            const taskPanel = document.getElementById('taskPanel');

            profilePanel.classList.add('hidden');
            friendPanel.classList.add('hidden');
            taskPanel.classList.add('hidden');

            if (panelType === 'profile') {
                profilePanel.classList.remove('hidden');
                document.getElementById('panelTitle').textContent = 'プロフィール';
            } else if (panelType === 'friend') {
                friendPanel.classList.remove('hidden');
                document.getElementById('panelTitle').textContent = 'フレンド';
            } else if (panelType === 'task') {
                taskPanel.classList.remove('hidden');
                document.getElementById('panelTitle').textContent = 'タスク';
            }

            overlay.classList.add('active');
            panel.classList.add('active');
        }

        function closePanel() {
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('sidePanel').classList.remove('active');
        }

        /* ========================================
           ゲーム制御
           ========================================
           ゲームの開始・進行・終了を管理
        */

        let gameTimer = null;
        let currentQuestion = '';
        let currentRomaji = '';
        let typedInput = '';

        // ゲーム開始
        function startGame(difficulty, isRankingMode = false) {
            gameState.currentDifficulty = difficulty;
            
            // ランキングモードの場合、難易度をランダムに選択
            if (isRankingMode) {
                gameState.currentDifficulty = ['easy', 'normal', 'hard'][Math.floor(Math.random() * 3)];
            }
            
            gameState.currentScore = 0;
            gameState.currentCombo = 0;
            gameState.gameTime = 60;
            gameState.gameActive = true;
            typedInput = '';

            document.getElementById('scoreDisplay').textContent = '0';
            document.getElementById('comboDisplay').textContent = '0';
            document.getElementById('timerDisplay').textContent = '60';

            switchScreen('gameScreen');
            nextQuestion();
            startTimer();

            // タスクを更新
            gameState.dailyTasks[0].current++;
            gameState.weeklyTasks[0].current++;
            updateTasksDisplay();
            saveGameState();
        }

        // 次の問題を出題
        function nextQuestion() {
            const qArray = questions[gameState.currentDifficulty];
            currentQuestion = qArray[Math.floor(Math.random() * qArray.length)];
            currentRomaji = convertToRomaji(currentQuestion).toLowerCase();
            typedInput = '';
            
            document.getElementById('questionDisplay').textContent = currentQuestion;
            updateRomajiDisplay();
        }

        // ローマ字表示を更新（入力済み部分と残り部分）
        function updateRomajiDisplay() {
            const romajiEl = document.getElementById('romajiDisplay');
            const typed = `<span class="romaji-typed">${typedInput}</span>`;
            const remaining = `<span class="romaji-remaining">${currentRomaji.substring(typedInput.length)}</span>`;
            romajiEl.innerHTML = typed + remaining;
        }

        // タイマー開始
        function startTimer() {
            gameTimer = setInterval(() => {
                gameState.gameTime--;
                document.getElementById('timerDisplay').textContent = gameState.gameTime;

                if (gameState.gameTime <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // ゲーム終了
        function endGame() {
            gameState.gameActive = false;
            clearInterval(gameTimer);

            const earnedCoins = Math.floor(gameState.currentScore / 10);
            const earnedXP = Math.floor(gameState.currentScore / 100);

            gameState.coins += earnedCoins;
            addXP(earnedXP);

            // タスク進捗を更新
            if (gameState.currentScore >= 5000) {
                gameState.dailyTasks[1].current++;
            }
            if (gameState.currentCombo >= 50) {
                gameState.dailyTasks[2].current++;
                gameState.weeklyTasks[2].current++;
            }

            if (gameState.currentScore >= 500) {
                gameState.weeklyTasks[1].current++;
            }

            saveGameState();

            document.getElementById('finalScore').textContent = gameState.currentScore;
            document.getElementById('earnedCoins').textContent = earnedCoins;
            document.getElementById('earnedXP').textContent = earnedXP;
            
            // ランキングモードの場合、スコアをランキングに登録
            if (gameState.currentRankingMode) {
                addScoreToRanking(gameState.currentRankingMode, gameState.currentScore);
                gameState.currentRankingMode = null;
            }
            
            switchScreen('resultScreen');
        }

        // ランキング表示
        function displayRanking(mode, title) {
            let ranking;
            if (mode === 'friend') {
                // フレンドランキングはフレンドか自分のスコアのみ
                ranking = getRanking('friend').filter(entry => 
                    gameState.friends.some(f => f.name === entry.name) || entry.userId === gameState.userId
                );
            } else {
                ranking = getRanking('world');
            }
            
            const rankingList = document.getElementById('rankingList');
            rankingList.innerHTML = '';
            
            document.getElementById('rankingTitle').textContent = title;
            
            if (ranking.length === 0) {
                rankingList.innerHTML = '<div style="text-align: center; color: var(--text-gray); padding: 20px;">ランキングデータがありません</div>';
                return;
            }
            
            ranking.forEach((entry, index) => {
                const rankItem = document.createElement('div');
                const isMyRank = entry.userId === gameState.userId;
                rankItem.className = `ranking-item ${isMyRank ? 'my-rank' : ''}`;
                rankItem.innerHTML = `
                    <span class="ranking-rank">#${index + 1}</span>
                    <span class="ranking-name">${entry.name}</span>
                    <span class="ranking-score">${entry.score.toLocaleString()}</span>
                `;
                rankingList.appendChild(rankItem);
            });
        }

        /* ========================================
           イベントリスナー設定
           ========================================
        */

        // メニューボタン
        document.getElementById('playBtn').addEventListener('click', function() {
            switchScreen('difficultyScreen');
        });

        document.getElementById('rankingBtn').addEventListener('click', function() {
            switchScreen('rankingModeScreen');
        });

        document.getElementById('profileBtn').addEventListener('click', function() {
            openPanel('profile');
        });

        // ランキングモード
        document.getElementById('friendRankingBtn').addEventListener('click', function() {
            if (gameState.friends.length >= 2) {
                gameState.currentRankingMode = 'friend';
                startGame(null, true);
            }
        });

        document.getElementById('worldRankingBtn').addEventListener('click', function() {
            gameState.currentRankingMode = 'world';
            startGame(null, true);
        });

        document.getElementById('viewRankingBtn').addEventListener('click', function() {
            switchScreen('rankingDisplayScreen');
            displayRanking('world', 'ワールドランキング');
        });

        // 難易度選択
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                startGame(this.dataset.difficulty, false);
            });
        });

        // ゲーム結果
        document.getElementById('continueBtn').addEventListener('click', function() {
            switchScreen('menuScreen');
        });

        // パネル
        document.getElementById('friendBtn').addEventListener('click', function() {
            openPanel('friend');
        });

        document.getElementById('taskBtn').addEventListener('click', function() {
            openPanel('task');
        });

        // 戻るボタン
        document.getElementById('backFromDifficultyBtn').addEventListener('click', function() {
            switchScreen('menuScreen');
        });

        document.getElementById('backFromRankingModeBtn').addEventListener('click', function() {
            switchScreen('menuScreen');
        });

        document.getElementById('backFromRankingViewBtn').addEventListener('click', function() {
            switchScreen('rankingModeScreen');
        });

        // オーバーレイ＆パネル
        document.getElementById('overlay').addEventListener('click', closePanel);
        document.getElementById('panelCloseBtn').addEventListener('click', closePanel);

        // タブ切り替え
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tabName = this.dataset.tab;
                const tabBar = this.parentElement;
                
                tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                tabBar.parentElement.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                
                this.classList.add('active');
                document.getElementById(tabName).classList.remove('hidden');
            });
        });

        // 名前変更
        document.getElementById('changeNameBtn').addEventListener('click', function() {
            const newName = document.getElementById('newNameInput').value.trim();
            if (newName && gameState.nameChangeCount < 3) {
                gameState.userName = newName;
                gameState.nameChangeCount++;
                saveGameState();
                updateUI();
            } else if (gameState.nameChangeCount >= 3) {
                alert('本日の変更回数に達しました。明日00:00に更新されます。');
            }
        });

        // フレンド追加
        document.getElementById('addFriendBtn').addEventListener('click', function() {
            const code = document.getElementById('addFriendCode').value.trim();
            if (code === gameState.friendCode) {
                alert('自分のフレンドコードは追加できません');
                return;
            }
            if (code && !gameState.friends.find(f => f.code === code)) {
                gameState.friends.push({
                    code: code,
                    name: `Friend${gameState.friends.length + 1}`,
                    online: Math.random() > 0.5
                });
                document.getElementById('addFriendCode').value = '';
                saveGameState();
                updateFriendsList();
                updateUI();
            }
        });

        /* ========================================
           キーボード入力処理（最重要）
           ========================================
           ミス時の処理：
           - コンボをリセット
           - typedInputをリセットしない（重要！）
           - つまり同じ位置で正しい文字を入力するまで進まない
        */
        document.addEventListener('keydown', (e) => {
            if (!gameState.gameActive) return;

            const key = e.key.toLowerCase();

            // アルファベットのみを受け付ける
            if (key.match(/[a-z]/)) {
                // 次に入力すべき文字を確認
                const expectedChar = currentRomaji[typedInput.length];
                
                if (key === expectedChar) {
                    // 正解：一文字入力
                    typedInput += key;
                    gameState.currentCombo++;
                    gameState.currentScore += 5 * gameState.currentCombo;
                    
                    document.getElementById('scoreDisplay').textContent = gameState.currentScore;
                    document.getElementById('comboDisplay').textContent = gameState.currentCombo;
                    updateRomajiDisplay();
                    
                    // 単語完成判定
                    if (typedInput === currentRomaji) {
                        nextQuestion();
                    }
                } else {
                    // ミス：コンボリセット、入力済み文字はそのまま
                    // 次に正しい文字を入力するまでtypedInputは進まない
                    gameState.currentCombo = 0;
                    document.getElementById('comboDisplay').textContent = '0';
                    // ★ 重要：typedInputはリセットしない
                    updateRomajiDisplay();
                }
            }
        });

        /* ========================================
           初期化処理
           ========================================
        */
        loadGameState();
        checkAndResetDaily();
        updateUI();
    </script>
</body>
</html>
