<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ タイピングゲーム - Firebase版</title>
    <!-- Firebase 10.8.0 - ES Modules -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-dark: #0a0e27;
            --accent-blue: #00d4ff;
            --accent-green: #00ff88;
            --accent-pink: #ff006e;
            --accent-purple: #7c3aed;
            --text-white: #f0f0f0;
            --text-gray: #a0a0a0;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, #1a0033 100%);
            color: var(--text-white);
            height: 100vh;
            overflow: hidden;
        }
        .game-container { width: 100%; height: 100vh; display: flex; flex-direction: column; background: radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.1) 0%, transparent 50%); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(0, 212, 255, 0.2); background: rgba(10, 14, 39, 0.95); }
        .game-title { font-size: 28px; font-weight: 700; background: linear-gradient(90deg, var(--accent-blue), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .level-display { display: flex; flex-direction: column; gap: 5px; background: rgba(0, 212, 255, 0.1); padding: 12px 20px; border-radius: 8px; }
        .level-value { font-size: 20px; font-weight: 700; color: var(--accent-blue); }
        .xp-bar { width: 150px; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); transition: width 0.3s; }
        .top-buttons { display: flex; gap: 10px; }
        .icon-btn { width: 45px; height: 45px; border: 1px solid rgba(0, 212, 255, 0.3); background: rgba(0, 212, 255, 0.05); color: var(--accent-blue); cursor: pointer; border-radius: 8px; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .icon-btn:hover { background: rgba(0, 212, 255, 0.15); transform: scale(1.05); }
        .coin-display { position: absolute; bottom: 40px; left: 40px; display: flex; align-items: center; gap: 10px; background: rgba(0, 255, 136, 0.1); padding: 12px 20px; border-radius: 8px; font-size: 18px; font-weight: 600; }
        .coin-value { color: var(--accent-green); }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; overflow-y: auto; }
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; justify-content: flex-start; gap: 30px; padding: 20px 0; }
        .screen.active { display: flex; }
        .menu-title { font-size: 48px; font-weight: 800; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .menu-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 500px; }
        .menu-btn { padding: 30px; border: 2px solid rgba(0, 212, 255, 0.3); background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(124, 58, 237, 0.1) 100%); color: var(--text-white); cursor: pointer; border-radius: 12px; font-size: 16px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: all 0.3s; }
        .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2); }
        .menu-btn .icon { font-size: 32px; }
        .difficulty-btn { padding: 25px 40px; border: 2px solid transparent; background: rgba(26, 31, 58, 0.5); color: var(--text-white); cursor: pointer; border-radius: 10px; font-size: 16px; font-weight: 600; transition: all 0.3s; }
        .difficulty-btn.easy { border-color: var(--accent-green); color: var(--accent-green); }
        .difficulty-btn.normal { border-color: var(--accent-blue); color: var(--accent-blue); }
        .difficulty-btn.hard { border-color: var(--accent-pink); color: var(--accent-pink); }
        .game-stats { display: flex; gap: 50px; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 14px; color: var(--text-gray); text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 42px; font-weight: 700; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .timer { font-size: 56px; font-weight: 800; color: var(--accent-pink); font-variant-numeric: tabular-nums; }
        .current-question { font-size: 48px; font-weight: 600; color: var(--accent-blue); text-align: center; font-family: 'Hiragino Maru Gothic', 'Yu Gothic', serif; }
        .romaji-display { font-size: 32px; color: var(--accent-green); font-family: 'Courier New', monospace; text-transform: lowercase; letter-spacing: 3px; }
        .romaji-typed { color: var(--accent-blue); font-weight: bold; }
        .romaji-remaining { color: var(--text-gray); }
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); display: none; z-index: 999; }
        .overlay.active { display: block; }
        .confirmation-dialog { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, rgba(26, 31, 58, 0.98) 0%, rgba(10, 14, 39, 0.98) 100%); border: 1px solid rgba(0, 212, 255, 0.3); padding: 40px; max-width: 400px; border-radius: 12px; z-index: 2000; display: none; flex-direction: column; gap: 20px; }
        .confirmation-dialog.active { display: flex; }
        .dialog-title { font-size: 24px; font-weight: 700; color: var(--accent-blue); text-align: center; }
        .dialog-message { font-size: 14px; color: var(--text-white); text-align: center; line-height: 1.6; }
        .dialog-warning { font-size: 12px; color: var(--accent-pink); background: rgba(255, 0, 110, 0.1); padding: 10px; border-radius: 6px; border: 1px solid rgba(255, 0, 110, 0.3); display: none; }
        .dialog-buttons { display: flex; gap: 10px; justify-content: center; }
        .dialog-btn { padding: 10px 20px; border: 1px solid rgba(0, 212, 255, 0.3); background: rgba(0, 212, 255, 0.1); color: var(--accent-blue); cursor: pointer; border-radius: 6px; font-weight: 600; text-transform: uppercase; font-size: 12px; transition: all 0.3s; }
        .dialog-btn:hover { background: rgba(0, 212, 255, 0.2); }
        .dialog-btn.danger { background: rgba(255, 0, 110, 0.2); border-color: rgba(255, 0, 110, 0.5); color: var(--accent-pink); }
        .dialog-btn.danger:hover { background: rgba(255, 0, 110, 0.3); }
        .side-panel { position: fixed; top: 0; right: -400px; width: 400px; height: 100%; background: linear-gradient(135deg, rgba(26, 31, 58, 0.95) 0%, rgba(10, 14, 39, 0.98) 100%); border-left: 1px solid rgba(0, 212, 255, 0.3); overflow-y: auto; transition: right 0.4s; z-index: 1000; padding: 30px 20px; }
        .side-panel.active { right: 0; }
        .panel-header { font-size: 20px; font-weight: 700; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid rgba(0, 212, 255, 0.3); display: flex; justify-content: space-between; align-items: center; }
        .panel-close { background: none; border: none; color: var(--accent-blue); font-size: 24px; cursor: pointer; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(0, 212, 255, 0.2); }
        .tab-btn { padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-gray); cursor: pointer; font-size: 14px; font-weight: 600; text-transform: uppercase; transition: all 0.3s; }
        .tab-btn.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }
        .profile-section { margin-bottom: 30px; }
        .user-name { font-size: 24px; font-weight: 700; color: var(--accent-blue); margin-bottom: 5px; }
        .user-id { font-size: 12px; color: var(--text-gray); margin-bottom: 20px; }
        .change-name-input { width: 100%; padding: 10px 12px; background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 6px; color: var(--text-white); font-size: 14px; margin-bottom: 10px; }
        .change-name-btn { width: 100%; padding: 10px; background: rgba(0, 212, 255, 0.2); border: 1px solid rgba(0, 212, 255, 0.5); border-radius: 6px; color: var(--accent-blue); cursor: pointer; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; font-size: 12px; }
        .name-change-count { font-size: 12px; color: var(--text-gray); margin-bottom: 15px; }
        .friend-code { background: rgba(124, 58, 237, 0.2); padding: 15px; border-radius: 8px; border: 1px solid rgba(124, 58, 237, 0.5); margin-top: 15px; }
        .friend-code-label { font-size: 12px; color: var(--text-gray); margin-bottom: 8px; text-transform: uppercase; }
        .friend-code-value { font-size: 18px; font-weight: 700; color: var(--accent-purple); font-family: 'Courier New', monospace; letter-spacing: 2px; text-align: center; }
        .friends-list { display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .friend-item { background: rgba(0, 212, 255, 0.05); padding: 15px; border-radius: 6px; border: 1px solid rgba(0, 212, 255, 0.2); display: flex; flex-direction: column; gap: 12px; }
        .friend-info { display: flex; align-items: flex-start; gap: 12px; }
        .friend-status { width: 12px; height: 12px; border-radius: 50%; background: var(--accent-green); margin-top: 6px; }
        .friend-status.offline { background: #ff4444; }
        .friend-details { flex: 1; }
        .friend-name { font-size: 14px; font-weight: 600; color: var(--text-white); margin-bottom: 3px; }
        .friend-code-small { font-size: 11px; color: var(--text-gray); font-family: 'Courier New', monospace; margin-bottom: 5px; }
        .friend-status-text { font-size: 11px; color: var(--accent-green); font-weight: 600; }
        .friend-status-text.offline { color: #ff4444; }
        .friend-actions { display: flex; gap: 6px; }
        .friend-btn { padding: 6px 10px; border: 1px solid rgba(0, 212, 255, 0.3); background: rgba(0, 212, 255, 0.1); color: var(--accent-blue); font-size: 11px; cursor: pointer; border-radius: 4px; font-weight: 600; flex: 1; text-transform: uppercase; transition: all 0.3s; }
        .friend-btn:hover { background: rgba(0, 212, 255, 0.2); }
        .friend-btn.delete { border-color: rgba(255, 0, 110, 0.5); color: var(--accent-pink); background: rgba(255, 0, 110, 0.1); }
        .friend-btn.delete:hover { background: rgba(255, 0, 110, 0.2); }
        .friend-btn.block { border-color: rgba(255, 100, 100, 0.5); color: #ff6464; background: rgba(255, 100, 100, 0.1); }
        .friend-btn.block:hover { background: rgba(255, 100, 100, 0.2); }
        .add-friend-section { margin-bottom: 20px; }
        .add-friend-input { width: 100%; padding: 10px 12px; background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 6px; color: var(--text-white); font-size: 14px; margin-bottom: 10px; font-family: 'Courier New', monospace; }
        .add-friend-btn { width: 100%; padding: 10px; background: rgba(0, 212, 255, 0.2); border: 1px solid rgba(0, 212, 255, 0.5); border-radius: 6px; color: var(--accent-blue); cursor: pointer; font-weight: 600; text-transform: uppercase; }
        .task-item { background: rgba(0, 212, 255, 0.05); padding: 15px; border-radius: 6px; border: 1px solid rgba(0, 212, 255, 0.2); margin-bottom: 12px; }
        .task-item.completed { background: rgba(0, 255, 136, 0.05); border-color: rgba(0, 255, 136, 0.3); }
        .task-title { font-size: 14px; font-weight: 600; color: var(--text-white); margin-bottom: 8px; }
        .task-progress { font-size: 12px; color: var(--text-gray); margin-bottom: 8px; }
        .task-progress-bar { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; overflow: hidden; }
        .task-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); transition: width 0.3s; }
        .task-reward { margin-top: 8px; font-size: 12px; color: var(--accent-green); font-weight: 600; }
        .back-btn { padding: 12px 24px; border: 1px solid rgba(0, 212, 255, 0.3); background: rgba(0, 212, 255, 0.05); color: var(--accent-blue); cursor: pointer; border-radius: 8px; font-weight: 600; text-transform: uppercase; }
        .ranking-mode-btn { padding: 25px 40px; border: 2px solid rgba(0, 212, 255, 0.3); border-radius: 10px; background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(124, 58, 237, 0.1) 100%); color: var(--text-white); font-size: 16px; font-weight: 600; cursor: pointer; text-transform: uppercase; transition: all 0.3s; }
        .ranking-mode-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2); }
        .ranking-mode-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .ranking-list { width: 100%; max-width: 600px; max-height: 400px; overflow-y: auto; background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 8px; padding: 20px; }
        .ranking-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0, 212, 255, 0.1); font-size: 14px; }
        .ranking-item:last-child { border-bottom: none; }
        .ranking-rank { font-weight: 700; color: var(--accent-blue); min-width: 40px; }
        .ranking-name { flex: 1; color: var(--text-white); margin: 0 20px; }
        .ranking-score { font-weight: 600; color: var(--accent-green); text-align: right; }
        .hidden { display: none !important; }
        @keyframes levelUp { 0% { opacity: 0; transform: translateY(-50px); } 50% { opacity: 1; } 100% { opacity: 0; transform: translateY(-100px); } }
        .level-up-notification { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); padding: 20px 40px; border-radius: 10px; font-size: 24px; font-weight: 700; animation: levelUp 3s ease-out forwards; z-index: 2000; pointer-events: none; }
        .firebase-status { position: fixed; bottom: 10px; right: 10px; padding: 10px 16px; font-size: 12px; border-radius: 6px; z-index: 999; font-weight: 600; transition: all 0.3s; }
        .firebase-status.connected { background: rgba(0, 255, 136, 0.25); color: var(--accent-green); border: 1px solid rgba(0, 255, 136, 0.6); }
        .firebase-status.disconnected { background: rgba(255, 100, 100, 0.25); color: #ff6464; border: 1px solid rgba(255, 100, 100, 0.6); }
        .firebase-status.loading { background: rgba(0, 212, 255, 0.25); color: var(--accent-blue); border: 1px solid rgba(0, 212, 255, 0.6); }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 30px;">
                <div class="game-title">⚡ TYPING</div>
            </div>
            <div class="header-right">
                <div class="level-display">
                    <div style="font-size: 12px; color: var(--text-gray); text-transform: uppercase;">Level</div>
                    <div class="level-value" id="levelDisplay">1</div>
                    <div class="xp-bar">
                        <div class="xp-bar-fill" id="xpBarFill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="top-buttons">
                    <button class="icon-btn" id="taskBtn">📋</button>
                    <button class="icon-btn" id="profileBtn">👤</button>
                    <button class="icon-btn" id="friendBtn">👥</button>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="screen active" id="menuScreen">
                <div class="menu-title">🎮 タイピングゲーム</div>
                <div class="menu-buttons">
                    <button class="menu-btn" id="playBtn"><div class="icon">🚀</div><div>PLAY</div></button>
                    <button class="menu-btn" id="rankingBtn"><div class="icon">🏆</div><div>RANKING</div></button>
                </div>
            </div>

            <div class="screen" id="rankingModeScreen">
                <div class="menu-title">🏆 ランキングモード</div>
                <div style="display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 400px;">
                    <button class="ranking-mode-btn" id="friendRankingViewBtn">フレンドランキングを見る</button>
                    <button class="ranking-mode-btn" id="worldRankingViewBtn">ワールドランキングを見る</button>
                    <button class="ranking-mode-btn" id="friendRankingPlayBtn">フレンドランキング(プレイ)</button>
                    <button class="ranking-mode-btn" id="worldRankingPlayBtn">ワールドランキング(プレイ)</button>
                </div>
                <button class="back-btn" id="backFromRankingModeBtn">戻る</button>
            </div>

            <div class="screen" id="rankingViewScreen">
                <div class="menu-title" id="rankingViewTitle">ランキング</div>
                <div class="ranking-list" id="rankingListContainer"></div>
                <button class="back-btn" id="backFromRankingViewBtn">戻る</button>
            </div>

            <div class="screen" id="difficultyScreen">
                <div style="font-size: 36px; font-weight: 700; color: var(--accent-blue);">難易度を選択</div>
                <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                    <button class="difficulty-btn easy" data-difficulty="easy">初級</button>
                    <button class="difficulty-btn normal" data-difficulty="normal">中級</button>
                    <button class="difficulty-btn hard" data-difficulty="hard">上級</button>
                </div>
                <button class="back-btn" id="backBtn">戻る</button>
            </div>

            <div class="screen" id="gameScreen">
                <div class="game-stats">
                    <div class="stat-box">
                        <div class="stat-label">Score</div>
                        <div class="stat-value" id="scoreDisplay">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Combo</div>
                        <div class="stat-value" id="comboDisplay">0</div>
                    </div>
                </div>
                <div class="timer" id="timerDisplay">60</div>
                <div class="current-question" id="questionDisplay">準備中...</div>
                <div class="romaji-display" id="romajiDisplay"></div>
            </div>

            <div class="screen" id="resultScreen">
                <div class="menu-title">ゲーム終了！</div>
                <div style="text-align: center; margin-bottom: 30px;">
                    <div style="font-size: 14px; color: var(--text-gray); margin-bottom: 10px;">FINAL SCORE</div>
                    <div id="finalScore" style="font-size: 48px; color: var(--accent-green); margin-bottom: 20px;">0</div>
                    <div style="font-size: 20px; color: var(--text-gray);">
                        <div>+<span id="earnedCoins">0</span> 💰</div>
                        <div>+<span id="earnedXP">0</span> ⭐</div>
                    </div>
                </div>
                <button class="menu-btn" id="continueBtn" style="width: 100%; max-width: 300px;"><div>続ける</div></button>
            </div>
        </div>

        <div class="coin-display">
            <div style="font-size: 24px;">💰</div>
            <div class="coin-value" id="coinDisplay">0</div>
        </div>

        <div class="overlay" id="overlay"></div>

        <div class="confirmation-dialog" id="confirmationDialog">
            <div class="dialog-title" id="dialogTitle">確認</div>
            <div class="dialog-message" id="dialogMessage">メッセージ</div>
            <div class="dialog-warning" id="dialogWarning"></div>
            <div class="dialog-buttons">
                <button class="dialog-btn" id="dialogCancelBtn">キャンセル</button>
                <button class="dialog-btn danger" id="dialogConfirmBtn">実行</button>
            </div>
        </div>

        <div class="side-panel" id="sidePanel">
            <div class="panel-header">
                <span id="panelTitle">パネル</span>
                <button class="panel-close" id="panelCloseBtn">✕</button>
            </div>

            <div id="profilePanel">
                <div class="profile-section">
                    <div class="user-name" id="displayName">ユーザー</div>
                    <div class="user-id" id="userId">ID: 000000</div>
                    
                    <input type="text" class="change-name-input" id="newNameInput" placeholder="新しい名前（最大20文字）" maxlength="20">
                    <button class="change-name-btn" id="changeNameBtn">名前を変更</button>
                    <div class="name-change-count" id="nameChangeCount">本日の変更回数: 0/3</div>

                    <div class="friend-code">
                        <div class="friend-code-label">フレンドコード</div>
                        <div class="friend-code-value" id="friendCodeDisplay">000000ABC</div>
                    </div>
                </div>
            </div>

            <div id="friendPanel" class="hidden">
                <div class="add-friend-section">
                    <input type="text" class="add-friend-input" id="addFriendCode" placeholder="フレンドコードを入力" maxlength="9">
                    <button class="add-friend-btn" id="addFriendBtn">追加する</button>
                </div>
                <div id="friendsList" class="friends-list"></div>
            </div>

            <div id="taskPanel" class="hidden">
                <div class="tab-bar">
                    <button class="tab-btn active" data-tab="daily">毎日</button>
                    <button class="tab-btn" data-tab="weekly">週間</button>
                </div>
                <div id="dailyTasksList"></div>
                <div id="weeklyTasksList" class="hidden"></div>
            </div>
        </div>

        <div class="firebase-status loading" id="firebaseStatus">⚡ Firebase 初期化中...</div>
    </div>

    <script type="module">
        // ===== Firebase インポート =====
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, update, remove, get, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ===== Firebase 設定 =====
        const firebaseConfig = {
            apiKey: "AIzaSyBXnNXQ5khcR0EvRide4C0PjshJZpSF4oM",
            authDomain: "typing-game-28ed0.firebaseapp.com",
            databaseURL: "https://typing-game-28ed0-default-rtdb.firebaseio.com",
            projectId: "typing-game-28ed0",
            storageBucket: "typing-game-28ed0.firebasestorage.app",
            messagingSenderId: "963797267101",
            appId: "1:963797267101:web:0d5d700458fb1991021a74"
        };

        // Firebase 初期化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function convertToRomaji(text) {
            let result = '';
            let i = 0;
            
            while (i < text.length) {
                if (text[i] === 'っ' && i + 1 < text.length) {
                    const nextChar = text[i + 1];
                    let nextRomaji = '';
                    
                    if (i + 2 < text.length) {
                        const twoChar = text.substring(i + 1, i + 3);
                        if (youonMap[twoChar]) {
                            nextRomaji = youonMap[twoChar];
                        }
                    }
                    
                    if (!nextRomaji) {
                        nextRomaji = romajiMap[nextChar] || nextChar;
                    }
                    
                    if (nextRomaji) {
                        result += nextRomaji[0] + nextRomaji[0] + nextRomaji.substring(1);
                    }
                    
                    i += 2;
                    continue;
                }
                
                if (i + 1 < text.length) {
                    const twoChar = text.substring(i, i + 2);
                    if (youonMap[twoChar]) {
                        result += youonMap[twoChar];
                        i += 2;
                        continue;
                    }
                }
                
                const char = text[i];
                result += romajiMap[char] || char;
                i++;
            }
            
            return result;
        }

        function setupFriendsListener() {
            if (!firebaseReady || !db || !gameState.friendCode) return;

            if (friendsUnsubscribe) {
                friendsUnsubscribe();
                friendsUnsubscribe = null;
            }
            
            const friendsRef = ref(db, `users/${gameState.friendCode}/friends`);
            
            friendsUnsubscribe = onValue(friendsRef, async (snapshot) => {
                const friendsData = snapshot.val();
                const friendsList = document.getElementById('friendsList');
                
                if (!friendsData) {
                    friendsList.innerHTML = '<div style="text-align: center; color: var(--text-gray);">フレンドがいません</div>';
                    gameState.friends = [];
                    localStorage.setItem('gameState', JSON.stringify(gameState));
                    return;
                }
                
                // フレンドの配列を作成
                const friendCodes = Object.keys(friendsData);
                const newFriends = [];
                
                for (const code of friendCodes) {
                    try {
                        // 各フレンドの詳細情報を取得
                        const userSnap = await get(ref(db, `users/${code}`));
                        const userData = userSnap.val() || {};
                        
                        // オンライン状態を取得
                        const statusSnap = await get(ref(db, `status/${code}`));
                        const status = statusSnap.val();
                        const isOnline = status && status.state === 'online';
                        
                        newFriends.push({
                            code: code,
                            name: userData.name || `ユーザー${code.slice(0, 4)}`,
                            isOnline: isOnline,
                            lastActive: userData.lastActive || Date.now()
                        });
                    } catch (e) {
                        console.warn(`フレンド情報取得エラー (${code}):`, e);
                        newFriends.push({
                            code: code,
                            name: `ユーザー${code.slice(0, 4)}`,
                            isOnline: false,
                            lastActive: Date.now()
                        });
                    }
                }
                
                // gameStateを更新
                gameState.friends = newFriends;
                localStorage.setItem('gameState', JSON.stringify(gameState));
                
                // UIを更新
                renderFriendsList(newFriends);
                
            }, (error) => {
                console.error('フレンドリスト監視エラー:', error);
            });
        }

                                    score: user.score,
                                    code: code 
                                });
                            }
                        });
                    } catch (e) {
                        console.warn('ランキング読み込みエラー:', e.message);
                    }
                }
            }

            rankings.sort((a, b) => b.score - a.score);
            rankings = rankings.slice(0, 100);

            container.innerHTML = '';
            rankings.forEach((entry, idx) => {
                const item = document.createElement('div');
                item.className = 'ranking-item';
                item.innerHTML = `<div class="ranking-rank">${idx + 1}位</div><div class="ranking-name">${entry.name}</div><div class="ranking-score">${entry.score.toLocaleString()}</div>`;

            });
        }

        function nextQuestion() { 
            const qArray = questions[gameState.currentDifficulty]; 
            currentQuestion = qArray[Math.floor(Math.random() * qArray.length)]; 
            currentRomaji = convertToRomaji(currentQuestion).toLowerCase(); 
            typedInput = ''; 
            document.getElementById('questionDisplay').textContent = currentQuestion;

        function updateRomajiDisplay() { 
            const romajiEl = document.getElementById('romajiDisplay'); 
            romajiEl.innerHTML = `<span class="romaji-typed">${typedInput}</span><span class="romaji-remaining">${currentRomaji.substring(typedInput.length)}</span>`; 
        }
        
        function startTimer() { 
            gameTimer = setInterval(() => { 
                gameState.gameTime--; 
                document.getElementById('timerDisplay').textContent = gameState.gameTime; 
                if (gameState.gameTime <= 0) endGame(); 
            }, 1000); 
        }
        
        function endGame() {
            gameState.gameActive = false; 
            clearInterval(gameTimer); 
            const coins = Math.floor(gameState.currentScore / 10); 
            const xp = Math.floor(gameState.currentScore / 100); 
            gameState.coins += coins; 
            gameState.xp += xp;
            
            if (gameState.currentScore >= 5000) gameState.dailyTasks[1].current++;
            if (gameState.currentCombo >= 50) { 
                gameState.dailyTasks[2].current++; 
                gameState.weeklyTasks[2].current++; 
            }
            if (gameState.currentScore >= 500) gameState.weeklyTasks[1].current++;
            
            while (gameState.xp >= gameState.maxXp) { 
                gameState.xp -= gameState.maxXp; 
                gameState.level++;
                gameState.maxXp = Math.floor(gameState.maxXp * 1.5);
            }
            
            if (firebaseReady && db) {
                set(ref(db, `users/${gameState.friendCode}/score`), gameState.currentScore)
                    .catch(e => console.warn('スコア保存エラー:', e));
            }
            
            saveGameState();
            document.getElementById('finalScore').textContent = gameState.currentScore; 
            document.getElementById('earnedCoins').textContent = coins; 
            document.getElementById('earnedXP').textContent = xp;
            switchScreen('resultScreen'); 
            updateUI();
        }

        });
        
        document.getElementById('taskBtn').addEventListener('click', () => {
            document.getElementById('profilePanel').classList.add('hidden');
            document.getElementById('friendPanel').classList.add('hidden');
            document.getElementById('taskPanel').classList.remove('hidden');
            document.getElementById('panelTitle').textContent = 'タスク';
            document.getElementById('sidePanel').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        });
        
        document.getElementById('profileBtn').addEventListener('click', () => {
            document.getElementById('profilePanel').classList.remove('hidden');
            document.getElementById('friendPanel').classList.add('hidden');
            document.getElementById('taskPanel').classList.add('hidden');
            document.getElementById('panelTitle').textContent = 'プロフィール';
            document.getElementById('sidePanel').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        });
        
        document.getElementById('friendBtn').addEventListener('click', () => {
            document.getElementById('profilePanel').classList.add('hidden');
            document.getElementById('friendPanel').classList.remove('hidden');
            document.getElementById('taskPanel').classList.add('hidden');
            document.getElementById('panelTitle').textContent = 'フレンド';
            document.getElementById('sidePanel').classList.add('active');
            document.getElementById('overlay').classList.add('active');
            // フレンドリストを表示
            renderFriendsList(gameState.friends);
        });

        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => startGame(btn.dataset.difficulty));
        });
        
        document.getElementById('backBtn').addEventListener('click', () => switchScreen('menuScreen'));
        document.getElementById('continueBtn').addEventListener('click', () => { 
            switchScreen('menuScreen'); 
            updateUI(); 
        });
        
        document.getElementById('overlay').addEventListener('click', () => { 
            document.getElementById('sidePanel').classList.remove('active'); 
            document.getElementById('overlay').classList.remove('active'); 
            closeConfirmationDialog(); 
        });
        
        document.getElementById('panelCloseBtn').addEventListener('click', () => { 
            document.getElementById('sidePanel').classList.remove('active'); 
            document.getElementById('overlay').classList.remove('active'); 
        });
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                if (this.dataset.tab === 'weekly') {
                    document.getElementById('dailyTasksList').classList.add('hidden');
                    document.getElementById('weeklyTasksList').classList.remove('hidden');
                } else {
                    document.getElementById('dailyTasksList').classList.remove('hidden');
                    document.getElementById('weeklyTasksList').classList.add('hidden');
                }
            });
        });
        
        document.getElementById('dialogCancelBtn').addEventListener('click', closeConfirmationDialog);
        
        document.getElementById('dialogConfirmBtn').addEventListener('click', () => {
            if (blockConfirmState.stage === 'delete') {
                deleteFriend(blockConfirmState.targetCode);
            } else if (blockConfirmState.stage === 1 || blockConfirmState.stage === 2) {
                blockFriend(blockConfirmState.targetCode);
            }
        });
        
        document.getElementById('changeNameBtn').addEventListener('click', async () => {
            const newName = document.getElementById('newNameInput').value.trim();
            if (newName && gameState.nameChangeCount < 3) {
                gameState.userName = newName;
                gameState.nameChangeCount++;
                
                if (firebaseReady && db) {
                    try {
                        await set(ref(db, `users/${gameState.friendCode}/name`), newName);
                        console.log(`✅ Firebase に名前を保存しました: ${newName}`);
                    } catch (e) {
                        console.error('❌ Firebase 名前保存エラー:', e.message);
                    }
                }
                
                saveGameState();
                updateUI();
                document.getElementById('newNameInput').value = '';
                alert(`✅ 名前を「${newName}」に変更しました！`);
            } else if (gameState.nameChangeCount >= 3) {
                alert('本日の変更回数に達しました。明日00:00に更新されます。');
            }
        });
        
        document.getElementById('addFriendBtn').addEventListener('click', () => { 
            const code = document.getElementById('addFriendCode').value.trim(); 
            if (code) addFriend(code); 
        });
        
        document.addEventListener('keydown', (e) => {
            if (!gameState.gameActive) return;
            const key = e.key.toLowerCase();
            if (key.match(/[a-z]/)) {
                const expectedChar = currentRomaji[typedInput.length];
                if (key === expectedChar) {
                    typedInput += key;
                    gameState.currentCombo++;
                    gameState.currentScore += 5 * gameState.currentCombo;
                    document.getElementById('scoreDisplay').textContent = gameState.currentScore;
                    document.getElementById('comboDisplay').textContent = gameState.currentCombo;
                    updateRomajiDisplay();
                    if (typedInput === currentRomaji) nextQuestion();
                } else {
                    gameState.currentCombo = 0;
                    document.getElementById('comboDisplay').textContent = '0';
                    updateRomajiDisplay();
                }
            }
        });

        // 初期化
        loadGameState();
        checkAndResetDaily();
        updateUI();

        // Firebase同期とフレンドリスナー設定
        setTimeout(async () => {
            // ユーザーデータをFirebaseに保存
            if (firebaseReady && db && gameState.friendCode) {
                try {
                    await set(ref(db, `users/${gameState.friendCode}`), {
                        name: gameState.userName,
                        lastActive: Date.now(),
                        level: gameState.level,
                        xp: gameState.xp,
                        coins: gameState.coins,
                        score: gameState.currentScore
                    });
                    console.log('✅ ユーザーデータ同期完了');
                    
                    // フレンドリスナーを設定
                    setupFriendsListener();
                    
                    // オンライン状態を設定
                    const userStatusRef = ref(db, `status/${gameState.friendCode}`);
                    const connectedRef = ref(db, '.info/connected');
                    onValue(connectedRef, (snap) => {
                        if (snap.val() === true) {
                            set(userStatusRef, {
                                state: 'online',
                                lastOnline: Date.now()
                            });
                            onDisconnect(userStatusRef).set({
                                state: 'offline',
                                lastOnline: Date.now()
                            });
                        }
                    });
                } catch (e) {
                    console.warn('Firebase 初期化エラー:', e);
                }
            }
        }, 1000);
    </script>
</body>
</html>
