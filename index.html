<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイピングゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- メインコンテンツ -->
    <div class="main-content">
        <!-- ゲーム画面 -->
        <div class="game-container">
            <h1>タイピングゲーム</h1>
            <p>ゲーム画面がここに表示されます</p>
        </div>

        <!-- フレンドボタン -->
        <button class="friend-btn" id="friendBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        </button>
    </div>

    <!-- 背景オーバーレイ -->
    <div class="overlay" id="overlay"></div>

    <!-- プロフィール・フレンドパネル -->
    <div class="side-panel" id="sidePanel">
        <!-- タブ -->
        <div class="panel-tabs">
            <button class="tab-btn active" data-tab="profile">プロフィール</button>
            <button class="tab-btn" data-tab="friends">フレンド</button>
        </div>

        <!-- プロフィールタブ -->
        <div class="tab-content active" id="profile-tab">
            <div class="profile-container">
                <!-- 名前設定 -->
                <div class="profile-section">
                    <h3>ユーザー名</h3>
                    <div class="name-display" id="nameDisplay">匿名 (12345678901)</div>
                    <button class="btn-secondary" id="changeName">名前を変更</button>
                    <p class="info-text">※1日1回のみ変更可能（20文字まで）</p>
                </div>

                <!-- 名前変更モーダル -->
                <div class="modal" id="nameChangeModal">
                    <div class="modal-content">
                        <h4>ユーザー名を変更</h4>
                        <input type="text" id="newNameInput" placeholder="新しい名前を入力（20文字まで）" maxlength="20">
                        <p class="char-count"><span id="charCount">0</span>/20</p>
                        <div class="modal-buttons">
                            <button class="btn-primary" id="confirmNameChange">変更</button>
                            <button class="btn-secondary" id="cancelNameChange">キャンセル</button>
                        </div>
                    </div>
                </div>

                <!-- フレンドコード -->
                <div class="profile-section">
                    <h3>フレンドコード</h3>
                    <div class="friend-code" id="friendCode">12345678ABC</div>
                    <button class="btn-secondary" id="copyFriendCode">コピー</button>
                </div>

                <!-- ステータスメッセージ -->
                <div class="status-message" id="statusMessage"></div>
            </div>
        </div>

        <!-- フレンドタブ -->
        <div class="tab-content" id="friends-tab">
            <div class="friends-container">
                <!-- フレンド申請セクション -->
                <div class="friends-section">
                    <h3>フレンド申請</h3>
                    <div class="friend-request-input">
                        <input type="text" id="friendCodeInput" placeholder="フレンドコードを入力" maxlength="11">
                        <button class="btn-primary" id="sendFriendRequest">申請送信</button>
                    </div>
                </div>

                <!-- フレンド受付セクション -->
                <div class="friends-section">
                    <h3>フレンド申請受け取り</h3>
                    <div class="friend-requests-list" id="friendRequestsList">
                        <p class="empty-message">申請はありません</p>
                    </div>
                </div>

                <!-- フレンドリスト -->
                <div class="friends-section">
                    <h3>フレンドリスト</h3>
                    <div class="friends-list" id="friendsList">
                        <p class="empty-message">フレンドがいません</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- クローズボタン -->
        <button class="close-btn" id="closePanel">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- 削除確認モーダル -->
    <div class="modal" id="deleteConfirmModal">
        <div class="modal-content">
            <h4>フレンドを削除</h4>
            <p>本当に削除しますか？</p>
            <div class="modal-buttons">
                <button class="btn-primary" id="confirmDelete">削除</button>
                <button class="btn-secondary" id="cancelDelete">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="script.js"></script>
</body>
</html>
