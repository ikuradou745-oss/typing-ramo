<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Typing Game - Fixed & Full Ranking Version</title>
    <style>
        /* --- 基本デザイン設定 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', 'Meiryo', sans-serif; }
        body { background-color: #f0f4f8; color: #333; overflow: hidden; width: 100vw; height: 100vh; }
        .hidden { display: none !important; }

        /* --- HUD (常に表示されるUI) --- */
        #hud-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #coin-display { position: absolute; bottom: 20px; left: 20px; background: #fff; padding: 12px 25px; border-radius: 50px; font-size: 24px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,.1); pointer-events: auto; border: 2px solid #ffd700; }
        #top-right-controls { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; pointer-events: auto; }
        
        #level-display { background: #fff; padding: 15px; border-radius: 15px; width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,.1); border: 1px solid #ddd; }
        .level-text { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #007BFF; display: flex; justify-content: space-between; }
        .xp-bar-container { width: 100%; height: 12px; background: #e0e0e0; border-radius: 6px; overflow: hidden; }
        #xp-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A); transition: 0.5s ease-out; }

        /* --- ボタン共通 --- */
        button { padding: 12px 24px; border: none; border-radius: 8px; background: #007BFF; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover:not(:disabled) { background: #0056b3; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* --- メインメニュー --- */
        #main-menu, #game-screen, #result-screen, #ranking-menu, #ranking-view-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 90%; max-width: 800px; }
        h1 { font-size: 48px; margin-bottom: 30px; color: #2c3e50; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .menu-buttons { display: flex; flex-direction: column; gap: 18px; align-items: center; }
        .menu-buttons button { width: 350px; font-size: 20px; padding: 18px; }

        /* --- タイピング画面 --- */
        #typing-area { margin-top: 30px; background: white; padding: 50px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        #japanese-word { font-size: 56px; margin-bottom: 15px; font-weight: bold; }
        #romaji-word { font-size: 40px; letter-spacing: 4px; font-family: 'Courier New', monospace; color: #999; }
        .typed { color: #d1d1d1; }
        .untyped { color: #333; }
        .game-info { display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        #ranking-stage-info { font-size: 20px; color: #e74c3c; font-weight: bold; margin-bottom: 10px; }

        /* --- サイドパネル (フレンド・タスク) --- */
        #dark-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 90; opacity: 0; transition: 0.4s; pointer-events: none; }
        #dark-overlay.active { opacity: 1; pointer-events: auto; }
        
        .side-panel { position: fixed; top: 0; right: 0; width: 85%; max-width: 500px; height: 100vh; background: #fff; z-index: 100; padding: 25px; transform: translateX(100%); transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); box-shadow: -5px 0 15px rgba(0,0,0,0.2); overflow-y: auto; }
        .side-panel.open { transform: translateX(0); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-bar button { flex: 1; background: #eee; color: #555; padding: 10px; }
        .tab-bar button.active { background: #007BFF; color: white; }

        .info-card { background: #f9f9f9; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        .friend-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; }
        .friend-code-display { font-family: monospace; background: #eee; padding: 10px; border-radius: 8px; font-size: 20px; font-weight: bold; color: #333; margin: 10px 0; border: 1px dashed #007BFF; }
        
        .task-item { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 12px; }
        .task-progress-bg { background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; }
        .task-progress-fill { background: #007BFF; height: 100%; border-radius: 5px; width: 0%; transition: 0.3s; }

        /* --- ランキング表示用 --- */
        .ranking-list { text-align: left; background: white; padding: 20px; border-radius: 15px; max-height: 400px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .ranking-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 18px; }
        .ranking-item.top1 { font-weight: bold; color: #d4af37; background: #fff9e6; border-radius: 8px; border: none; }
        .ranking-item.top2 { font-weight: bold; color: #c0c0c0; background: #f2f2f2; border-radius: 8px; border: none; }
        .ranking-item.top3 { font-weight: bold; color: #cd7f32; background: #fdf5e6; border-radius: 8px; border: none; }

        #notification-area { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; width: 90%; max-width: 400px; }
        .notification { background: #333; color: #fff; padding: 15px 25px; border-radius: 10px; margin-bottom: 10px; text-align: center; font-weight: bold; animation: slideDown 0.5s ease forwards; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .notif-reward { color: #ffeb3b; }
    </style>
</head>
<body>

    <div id="hud-container">
        <div id="coin-display">🪙 <span id="coin-value">0</span></div>
        <div id="top-right-controls">
            <div id="level-display">
                <div class="level-text">
                    <span>Lv. <span id="current-level">1</span></span>
                    <span id="current-xp-text" style="font-size:12px; color:#666;">0 / 100 XP</span>
                </div>
                <div class="xp-bar-container"><div id="xp-bar-fill"></div></div>
            </div>
            <button id="profile-open-btn">👤 プロフィール / フレンド</button>
            <button id="task-open-btn">📋 タスク</button>
        </div>
    </div>

    <div id="dark-overlay"></div>

    <div id="main-menu">
        <h1>TYPING ONLINE</h1>
        <div class="menu-buttons">
            <button id="start-game-btn">一人でプレイ</button>
            <button id="ranking-mode-btn" style="background:#8e44ad;">ランキングモード</button>
        </div>
        
        <div id="difficulty-selection" class="hidden" style="margin-top:20px;">
            <h2>難易度を選択</h2>
            <button class="diff-btn" data-diff="easy">EASY</button>
            <button class="diff-btn" data-diff="normal">NORMAL</button>
            <button class="diff-btn" data-diff="hard">HARD</button>
            <br>
            <button class="back-to-main-btn" style="background:#666; margin-top:10px;">戻る</button>
        </div>
    </div>

    <div id="ranking-menu" class="hidden">
        <h2>ランキングモード</h2>
        <div class="menu-buttons" style="margin-top:20px;">
            <button id="play-friend-ranking-btn">フレンドランキングに挑戦</button>
            <button id="play-online-ranking-btn">オンラインランキングに挑戦</button>
            <button id="view-ranking-btn" style="background:#27ae60;">ランキングを見る</button>
            <button class="back-to-main-btn" style="background:#666;">戻る</button>
        </div>
    </div>

    <div id="ranking-view-screen" class="hidden">
        <h2>ランキング</h2>
        <div class="tab-bar" style="margin-top:20px;">
            <button id="tab-view-friend-ranking" class="active">フレンド</button>
            <button id="tab-view-online-ranking">オンライン</button>
        </div>
        <div class="ranking-list" id="ranking-list-content">
            読み込み中...
        </div>
        <button class="back-to-main-btn" style="background:#666;">戻る</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="ranking-stage-info" class="hidden">TIME ATTACK (EASY)</div>
        <div class="game-info">
            <div>TIME: <span id="time-left">60</span></div>
            <div>SCORE: <span id="current-score">0</span></div>
            <div>COMBO: <span id="current-combo">0</span></div>
        </div>
        <div id="typing-area">
            <div id="japanese-word">読み込み中...</div>
            <div id="romaji-word">loading...</div>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>リザルト</h2>
        <div style="font-size:32px; margin:20px 0;">SCORE: <span id="final-score">0</span></div>
        <div id="ranking-result-info" style="font-size:20px; color:#e74c3c; margin-bottom:10px; font-weight:bold;"></div>
        <div id="reward-info" style="margin-bottom:20px; color:#4CAF50; font-weight:bold;"></div>
        <button id="return-home-btn">メニューへ戻る</button>
    </div>

    <div id="friend-panel" class="side-panel">
        <div class="panel-header">
            <h3>プロフィール / フレンド</h3>
            <button class="close-panel-btn">✕</button>
        </div>
        <div class="tab-bar">
            <button id="tab-profile-btn" class="active">プロフィール</button>
            <button id="tab-friend-btn">フレンド</button>
        </div>

        <div id="tab-profile-content">
            <div class="info-card">
                <p>現在の名前:</p>
                <h2 id="display-name">初心さん</h2>
                <input type="text" id="name-input" maxlength="20" style="padding:8px; width:100%; margin-top:10px;" placeholder="新しい名前を入力">
                <button id="change-name-btn" style="width:100%; margin-top:10px;">名前を変更 (本日残り<span id="name-change-count">3</span>回)</button>
            </div>
            <div class="info-card">
                <p>あなたのフレンドコード:</p>
                <div class="friend-code-display" id="my-friend-code">生成中...</div>
                <p style="font-size:12px; color:#888; margin-top:5px;">数字8桁＋英語3桁のコードです</p>
            </div>
        </div>

        <div id="tab-friend-content" class="hidden">
            <div class="info-card">
                <h4>フレンド追加</h4>
                <input type="text" id="friend-search-input" placeholder="コードを入力" style="padding:8px; width:70%;">
                <button id="add-friend-btn">申請</button>
            </div>
            <div id="friend-requests-area"></div>
            <h4>フレンドリスト</h4>
            <div id="friend-list-area" style="margin-top:10px;"></div>
        </div>
    </div>

    <div id="task-panel" class="side-panel">
        <div class="panel-header">
            <h3>クエストタスク</h3>
            <button class="close-panel-btn">✕</button>
        </div>
        <div class="tab-bar">
            <button id="tab-daily-btn" class="active">毎日</button>
            <button id="tab-weekly-btn">週間</button>
        </div>
        <div id="task-list-container"></div>
        <div id="task-reward-area" style="margin-top:20px;">
            <button id="claim-task-reward-btn" disabled style="width:100%; padding:20px; font-size:18px;">タスク進行中...</button>
        </div>
    </div>

    <div id="notification-area"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        /* --- Firebase 設定 --- */
        const firebaseConfig = {
            apiKey: "AIzaSyBXnNXQ5khcR0EvRide4C0PjshJZpSF4oM",
            authDomain: "typing-game-28ed0.firebaseapp.com",
            databaseURL: "https://typing-game-28ed0-default-rtdb.firebaseio.com",
            projectId: "typing-game-28ed0",
            storageBucket: "typing-game-28ed0.firebasestorage.app",
            messagingSenderId: "963797267101",
            appId: "1:963797267101:web:0d5d700458fb1991021a74",
            measurementId: "G-CL4B6ZK0SC"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getDatabase(app);

        /* --- ゲームステート --- */
        let user = {
            uid: null,
            name: "初心さん",
            coins: 0,
            level: 1,
            xp: 0,
            friendCode: "",
            nameChanges: 3,
            lastReset: null,
            lastRankingReward: null,
            friends: {},
            requests: {},
            tasks: {
                daily: { play: 0, score: 0, combo: 0, completed: false, targets: { play: 10, score: 25000, combo: 100 } },
                weekly: { play: 0, scoreCount: 0, combo: 0, completed: false, targets: { play: 100, scoreCount: 10, combo: 150 } }
            }
        };

        let gameMode = "solo";
        let gameActive = false;
        let score = 0;
        let combo = 0;
        let timeLeft = 60;
        let timer = null;
        let currentWord = null;
        let charIdx = 0;
        let activeDiff = "easy";
        let wordsTypedCount = 0; // タイムアタック用

        const WordDB = {
            easy: [{t:"ねこ",r:"neko"},{t:"いぬ",r:"inu"},{t:"とり",r:"tori"},{t:"うし",r:"ushi"},{t:"さら",r:"sara"}],
            normal: [{t:"にほんご",r:"nihongo"},{t:"らいおん",r:"raion"},{t:"ぱそこん",r:"pasokon"},{t:"あおぞら",r:"aozora"}],
            hard: [{t:"じんこうちのう",r:"jinkouchinou"},{t:"きゃべつたべたい",r:"kyabetsutabetai"},{t:"ていれいきょうぎ",r:"teireikyougi"}]
        };

        /* --- ユーティリティ --- */
        function generateFriendCode() {
            // 数字8桁
            let nums = "";
            for(let i=0; i<8; i++) nums += Math.floor(Math.random()*10).toString();
            // 英語大文字3桁
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let eng = "";
            for(let i=0; i<3; i++) eng += letters.charAt(Math.floor(Math.random() * letters.length));
            return `${nums}${eng}`;
        }

        function showNotification(msg, isReward = false) {
            const container = document.getElementById("notification-area");
            const div = document.createElement("div");
            div.className = "notification" + (isReward ? " notif-reward" : "");
            div.innerText = msg;
            container.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        function getTodayResetTime() {
            const now = new Date();
            const reset = new Date(now);
            reset.setHours(7, 0, 0, 0); // 朝7時リセット
            if (now.getHours() < 7) reset.setDate(reset.getDate() - 1);
            return reset.getTime();
        }

        /* --- データ同期・復元処理 --- */
        async function loadUserData(uid) {
            const snapshot = await get(ref(db, `users/${uid}`));
            if (snapshot.exists()) {
                const data = snapshot.val();
                
                // 既存データを保持しつつ、欠落しているフィールドを補完
                user.uid = uid;
                user.name = data.name || "初心さん";
                user.coins = Number.isFinite(data.coins) ? data.coins : 0;
                user.level = Number.isFinite(data.level) ? data.level : 1;
                user.xp = Number.isFinite(data.xp) ? data.xp : 0;
                user.friendCode = data.friendCode || generateFriendCode();
                user.nameChanges = Number.isFinite(data.nameChanges) ? data.nameChanges : 3;
                user.lastReset = data.lastReset || null;
                user.lastRankingReward = data.lastRankingReward || null;
                
                if (data.friends) user.friends = data.friends;
                if (data.requests) user.requests = data.requests;
                if (data.tasks) {
                    if (data.tasks.daily) Object.assign(user.tasks.daily, data.tasks.daily);
                    if (data.tasks.weekly) Object.assign(user.tasks.weekly, data.tasks.weekly);
                }
                
                // フレンドコードの紐付け登録（存在しない場合のみ）
                if (!data.friendCode) {
                    await set(ref(db, `users/${uid}/friendCode`), user.friendCode);
                    await set(ref(db, `friendCodes/${user.friendCode}`), uid);
                }

                await checkDailyReset();
                await checkRankingReward();
            } else {
                // 新規ユーザー初期化
                user.uid = uid;
                user.friendCode = generateFriendCode();
                await set(ref(db, `users/${uid}`), user);
                await set(ref(db, `friendCodes/${user.friendCode}`), uid);
            }
            
            // UI更新
            updateHUD();
            listenToRequests();
        }

        async function saveUserData() {
            if (!user.uid) return;
            // ネストされたオブジェクトも含めて更新
            await update(ref(db, `users/${user.uid}`), {
                name: user.name,
                coins: user.coins,
                level: user.level,
                xp: user.xp,
                friendCode: user.friendCode,
                nameChanges: user.nameChanges,
                lastReset: user.lastReset,
                lastRankingReward: user.lastRankingReward,
                tasks: user.tasks
            });
            updateHUD();
        }

        function updateHUD() {
            document.getElementById("coin-value").innerText = Math.floor(user.coins);
            document.getElementById("current-level").innerText = user.level;
            document.getElementById("display-name").innerText = user.name;
            document.getElementById("my-friend-code").innerText = user.friendCode;
            document.getElementById("name-change-count").innerText = user.nameChanges;
            
            const nextXP = user.level * 100;
            const progress = (user.xp / nextXP) * 100;
            document.getElementById("xp-bar-fill").style.width = `${Math.min(100, progress)}%`;
            document.getElementById("current-xp-text").innerText = `${Math.floor(user.xp)} / ${nextXP} XP`;
        }

        async function checkDailyReset() {
            const currentReset = getTodayResetTime();
            if (!user.lastReset || user.lastReset < currentReset) {
                user.tasks.daily.play = 0;
                user.tasks.daily.score = 0;
                user.tasks.daily.combo = 0;
                user.tasks.daily.completed = false;
                user.nameChanges = 3; // 1日3回に戻す
                user.lastReset = Date.now();
                await saveUserData();
            }
        }

        async function checkRankingReward() {
            const currentReset = getTodayResetTime();
            if (user.lastRankingReward && user.lastRankingReward > currentReset) return;

            // 簡易的なオンライン報酬チェック（本来はバッチ処理等で行うのが望ましい）
            const onlineSnap = await get(ref(db, 'rankings/online'));
            if (onlineSnap.exists()) {
                const sorted = Object.values(onlineSnap.val()).sort((a, b) => b.score - a.score);
                const rank = sorted.findIndex(r => r.uid === user.uid) + 1;
                if (rank > 0 && rank <= 10) {
                    const bonus = (11 - rank) * 1000;
                    user.coins += bonus;
                    user.xp += 100;
                    user.lastRankingReward = Date.now();
                    await saveUserData();
                    showNotification(`ランキング報酬獲得！ ${rank}位特典: 🪙${bonus}`, true);
                }
            }
        }

        /* --- タイピングロジック --- */
        function startGame(mode, diff = "easy") {
            gameMode = mode;
            activeDiff = diff;
            score = 0; combo = 0; timeLeft = 60; wordsTypedCount = 0;
            gameActive = true;

            document.querySelectorAll("#main-menu, #ranking-menu, #difficulty-selection").forEach(el => el.classList.add("hidden"));
            document.getElementById("game-screen").classList.remove("hidden");
            
            const stageInfo = document.getElementById("ranking-stage-info");
            stageInfo.classList.toggle("hidden", gameMode === "solo");

            updateGameUI();
            setNextWord();

            timer = setInterval(() => {
                timeLeft--;
                document.getElementById("time-left").innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function setNextWord() {
            let diff = activeDiff;
            if (gameMode !== "solo") {
                // タイムアタック：5問ごとに難易度をループ (easy -> normal -> hard)
                const cycle = Math.floor(wordsTypedCount / 5) % 3;
                diff = cycle === 0 ? "easy" : (cycle === 1 ? "normal" : "hard");
                document.getElementById("ranking-stage-info").innerText = `TIME ATTACK (${diff.toUpperCase()})`;
            }
            
            const list = WordDB[diff];
            currentWord = list[Math.floor(Math.random() * list.length)];
            charIdx = 0;
            renderWord();
        }

        function renderWord() {
            document.getElementById("japanese-word").innerText = currentWord.t;
            const romaji = currentWord.r;
            let html = "";
            for (let i = 0; i < romaji.length; i++) {
                html += `<span class="${i < charIdx ? 'typed' : 'untyped'}">${romaji[i]}</span>`;
            }
            document.getElementById("romaji-word").innerHTML = html;
        }

        function updateGameUI() {
            document.getElementById("current-score").innerText = score;
            document.getElementById("current-combo").innerText = combo;
        }

        async function endGame() {
            gameActive = false;
            clearInterval(timer);
            document.getElementById("game-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");
            
            const earnedCoins = score / 10;
            const earnedXP = score / 100;
            user.coins += earnedCoins;
            user.xp += earnedXP;
            
            // タスク進捗
            user.tasks.daily.play++;
            user.tasks.weekly.play++;
            if (score > user.tasks.daily.score) user.tasks.daily.score = score;
            if (combo > user.tasks.daily.combo) user.tasks.daily.combo = combo;
            if (score >= 2500) user.tasks.weekly.scoreCount++;

            document.getElementById("final-score").innerText = score;
            document.getElementById("reward-info").innerText = `報酬: 🪙${Math.floor(earnedCoins)} / ✨${Math.floor(earnedXP)}XP`;
            
            // ランキング保存ロジック（ハイスコアのみ上書き）
            if (gameMode !== "solo") {
                const path = gameMode === "onlineRanking" ? "rankings/online" : `rankings/friend/${user.uid}`;
                const snap = await get(ref(db, `${path}/${user.uid}`));
                const existingScore = snap.exists() ? snap.val().score : 0;

                if (score > existingScore) {
                    await update(ref(db, `${path}/${user.uid}`), {
                        uid: user.uid,
                        name: user.name,
                        score: score,
                        timestamp: Date.now()
                    });
                    document.getElementById("ranking-result-info").innerText = "自己ベスト更新！ランキングを塗り替えました！";
                } else {
                    document.getElementById("ranking-result-info").innerText = `ベストスコア(${existingScore})に届きませんでした。`;
                }
            }

            checkLevelUp();
            await saveUserData();
        }

        function checkLevelUp() {
            let nextXP = user.level * 100;
            while (user.xp >= nextXP) {
                user.xp -= nextXP;
                user.level++;
                showNotification(`LEVEL UP! Lv.${user.level}`, true);
                nextXP = user.level * 100;
            }
        }

        /* --- キーボード入力 --- */
        window.addEventListener("keydown", (e) => {
            if (!gameActive || e.repeat) return;
            if (e.key === currentWord.r[charIdx]) {
                charIdx++;
                combo++;
                score += (10 * combo);
                if (charIdx >= currentWord.r.length) {
                    wordsTypedCount++;
                    setNextWord();
                } else {
                    renderWord();
                }
            } else if (e.key.length === 1 && !e.ctrlKey) {
                combo = 0;
            }
            updateGameUI();
        });

        /* --- UI画面遷移 --- */
        document.querySelectorAll(".back-to-main-btn").forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll("#difficulty-selection, #ranking-menu, #ranking-view-screen").forEach(el => el.classList.add("hidden"));
                document.getElementById("main-menu").classList.remove("hidden");
                document.querySelector(".menu-buttons").classList.remove("hidden");
            };
        });

        document.getElementById("start-game-btn").onclick = () => {
            document.querySelector("#main-menu .menu-buttons").classList.add("hidden");
            document.getElementById("difficulty-selection").classList.remove("hidden");
        };

        document.querySelectorAll(".diff-btn").forEach(btn => {
            btn.onclick = () => startGame("solo", btn.dataset.diff);
        });

        document.getElementById("ranking-mode-btn").onclick = () => {
            document.getElementById("main-menu").classList.add("hidden");
            document.getElementById("ranking-menu").classList.remove("hidden");
        };

        document.getElementById("play-online-ranking-btn").onclick = () => startGame("onlineRanking");
        document.getElementById("play-friend-ranking-btn").onclick = () => {
            if (Object.keys(user.friends).length < 1) return alert("フレンドがまだいません！");
            startGame("friendRanking");
        };

        document.getElementById("return-home-btn").onclick = () => {
            document.getElementById("result-screen").classList.add("hidden");
            document.getElementById("main-menu").classList.remove("hidden");
            document.querySelector("#main-menu .menu-buttons").classList.remove("hidden");
        };

        /* --- ランキング表示 --- */
        document.getElementById("view-ranking-btn").onclick = () => {
            document.getElementById("ranking-menu").classList.add("hidden");
            document.getElementById("ranking-view-screen").classList.remove("hidden");
            loadRankingView("online");
        };

        async function loadRankingView(type) {
            const listContent = document.getElementById("ranking-list-content");
            listContent.innerHTML = "読み込み中...";
            const snap = await get(ref(db, `rankings/${type}`));
            if (!snap.exists()) {
                listContent.innerHTML = "記録がありません。";
                return;
            }
            const scores = Object.values(snap.val()).sort((a,b)=>b.score - a.score);
            listContent.innerHTML = "";
            scores.forEach((s, i) => {
                const div = document.createElement("div");
                div.className = `ranking-item top${i+1 > 3 ? '' : i+1}`;
                div.innerHTML = `<span>${i+1}位. ${s.name}</span><span>${s.score} pts</span>`;
                listContent.appendChild(div);
            });
        }

        /* --- プロフィール・フレンド機能 --- */
        function openPanel(id) {
            document.getElementById(id).classList.add("open");
            document.getElementById("dark-overlay").classList.add("active");
        }
        function closeAllPanels() {
            document.querySelectorAll(".side-panel").forEach(p => p.classList.remove("open"));
            document.getElementById("dark-overlay").classList.remove("active");
        }

        document.getElementById("profile-open-btn").onclick = () => openPanel("friend-panel");
        document.getElementById("task-open-btn").onclick = () => {
            openPanel("task-panel");
            renderTasks();
        };
        document.getElementById("dark-overlay").onclick = closeAllPanels;
        document.querySelectorAll(".close-panel-btn").forEach(b => b.onclick = closeAllPanels);

        document.getElementById("change-name-btn").onclick = async () => {
            const newName = document.getElementById("name-input").value.trim();
            if (user.nameChanges <= 0) return alert("本日の変更回数上限です。");
            if (!newName || newName.length > 20) return alert("名前は20文字以内で入力してください。");
            
            user.name = newName;
            user.nameChanges--;
            await saveUserData();
            showNotification("名前を変更しました！");
        };

        document.getElementById("tab-profile-btn").onclick = () => switchTab("profile");
        document.getElementById("tab-friend-btn").onclick = () => {
            switchTab("friend");
            renderFriendList();
        };

        function switchTab(type) {
            document.getElementById("tab-profile-content").classList.toggle("hidden", type !== "profile");
            document.getElementById("tab-friend-content").classList.toggle("hidden", type !== "friend");
            document.getElementById("tab-profile-btn").classList.toggle("active", type === "profile");
            document.getElementById("tab-friend-btn").classList.toggle("active", type === "friend");
        }

        document.getElementById("add-friend-btn").onclick = async () => {
            const code = document.getElementById("friend-search-input").value.trim();
            if (code === user.friendCode) return alert("自分のコードです。");
            const targetUidSnap = await get(ref(db, `friendCodes/${code}`));
            if (!targetUidSnap.exists()) return alert("見つかりません。");
            const targetUid = targetUidSnap.val();
            await set(ref(db, `users/${targetUid}/requests/${user.uid}`), { name: user.name, code: user.friendCode });
            alert("申請を送りました！");
        };

        function listenToRequests() {
            onValue(ref(db, `users/${user.uid}/requests`), (snap) => {
                const area = document.getElementById("friend-requests-area");
                area.innerHTML = "";
                const data = snap.val();
                if (!data) return;
                Object.keys(data).forEach(uid => {
                    const req = data[uid];
                    const div = document.createElement("div");
                    div.className = "friend-item";
                    div.innerHTML = `<div>${req.name}さん</div><button onclick="acceptFriend('${uid}','${req.name}','${req.code}')">許可</button>`;
                    area.appendChild(div);
                });
            });
        }

        window.acceptFriend = async (uid, name, code) => {
            await update(ref(db, `users/${user.uid}/friends/${uid}`), { name, code });
            await update(ref(db, `users/${uid}/friends/${user.uid}`), { name: user.name, code: user.friendCode });
            await remove(ref(db, `users/${user.uid}/requests/${uid}`));
            showNotification(`${name}さんとフレンドになりました！`);
        };

        async function renderFriendList() {
            const area = document.getElementById("friend-list-area");
            area.innerHTML = "";
            const friends = user.friends;
            for (let fUid in friends) {
                const div = document.createElement("div");
                div.className = "friend-item";
                div.innerHTML = `<div><b>${friends[fUid].name}</b><br><small>#${friends[fUid].code}</small></div>`;
                area.appendChild(div);
            }
        }

        /* --- タスク --- */
        let currentTaskTab = "daily";
        document.getElementById("tab-daily-btn").onclick = () => { currentTaskTab = "daily"; renderTasks(); };
        document.getElementById("tab-weekly-btn").onclick = () => { currentTaskTab = "weekly"; renderTasks(); };

        function renderTasks() {
            const container = document.getElementById("task-list-container");
            container.innerHTML = "";
            const t = user.tasks[currentTaskTab];
            const data = currentTaskTab === "daily" ? 
                [{l:"10回プレイ", c:t.play, g:t.targets.play}, {l:`スコア${t.targets.score}`, c:t.score, g:t.targets.score}] :
                [{l:"100回プレイ", c:t.play, g:t.targets.play}];

            let allDone = true;
            data.forEach(task => {
                const p = Math.min(100, (task.c/task.g)*100);
                if(p < 100) allDone = false;
                const div = document.createElement("div");
                div.className = "task-item";
                div.innerHTML = `<div>${task.l} (${task.c}/${task.g})</div><div class="task-progress-bg"><div class="task-progress-fill" style="width:${p}%"></div></div>`;
                container.appendChild(div);
            });

            const btn = document.getElementById("claim-task-reward-btn");
            btn.disabled = !(allDone && !t.completed);
            btn.innerText = t.completed ? "受取済み" : (allDone ? "報酬受取！" : "進行中...");
            btn.onclick = () => claimReward(currentTaskTab);
        }

        async function claimReward(type) {
            user.xp += (type === "daily" ? 100 : 1000);
            user.coins += (type === "daily" ? 500 : 5000);
            user.tasks[type].completed = true;
            await saveUserData();
            showNotification("報酬を獲得しました！", true);
            renderTasks();
        }

        /* --- 認証 --- */
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                await loadUserData(u.uid);
            } else {
                signInAnonymously(auth);
            }
        });
    </script>
</body>
</html>
