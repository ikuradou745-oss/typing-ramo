<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイピングゲーム - プロフィール＆フレンド</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>
</head>
<body>
    <div class="game-area" id="gameArea">
        <header>
            <div class="friend-icon" id="friendIcon">👥</div>
        </header>
        <div class="game-placeholder">
            タイピングゲームエリア<br>
            <span class="game-subtext">ここにゲーム画面が入ります</span>
        </div>
    </div>

    <!-- 背景オーバーレイ -->
    <div class="overlay" id="overlay"></div>

    <!-- サイドパネル -->
    <div class="side-panel" id="sidePanel">
        <div class="panel-header">
            <h2>メニュー</h2>
            <span class="close-btn" id="closePanel">&times;</span>
        </div>

        <!-- タブ -->
        <div class="tabs">
            <div class="tab active" data-tab="profile">プロフィール</div>
            <div class="tab" data-tab="friend">フレンド</div>
        </div>

        <!-- プロフィールタブ -->
        <div class="tab-content active" id="profileTab">
            <div class="profile-field">
                <div class="profile-label">名前</div>
                <div class="profile-value" id="profileName">読み込み中...</div>
                <div class="name-change-area">
                    <input type="text" class="name-input" id="newName" placeholder="新しい名前" maxlength="20">
                    <button class="btn btn-small" id="changeNameBtn">変更</button>
                </div>
                <div class="remaining-changes" id="remainingChanges">残り3回</div>
            </div>
            <div class="profile-field">
                <div class="profile-label">フレンドコード</div>
                <div class="profile-value" id="friendCode">読み込み中...</div>
            </div>
        </div>

        <!-- フレンドタブ -->
        <div class="tab-content" id="friendTab">
            <!-- フレンドコード入力 -->
            <div class="friend-input-area">
                <h4>フレンドコード入力</h4>
                <div class="friend-input-group">
                    <input type="text" class="friend-input" id="friendCodeInput" placeholder="12345678ABC">
                    <button class="btn btn-small" id="sendRequestBtn">申請</button>
                </div>
            </div>

            <!-- フレンド申請リスト -->
            <div>
                <h4>フレンド申請</h4>
                <div id="requestsList">
                    <p style="color: #888;">読み込み中...</p>
                </div>
            </div>

            <!-- フレンドリスト -->
            <div style="margin-top: 20px;">
                <h4>フレンドリスト</h4>
                <div id="friendsList">
                    <p style="color: #888;">読み込み中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 確認モーダル -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content" id="modalContent">
            <!-- 動的に内容を挿入 -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
