<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ タイピングクラフト・卒業シーズンパス</title>
    <script type="importmap">
        { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js" } }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-dark: #0a0e27; --accent-blue: #00d4ff; --accent-green: #00ff88;
            --accent-pink: #ff006e; --accent-purple: #7c3aed; --accent-gold: #ffd700;
            --accent-green-light: #90EE90; --accent-green-dark: #006400;
            --text-white: #f0f0f0; --text-gray: #a0a0a0;
            --item-stone: #808080; --item-fire: #ff4500; --item-thunder: #ffd700;
            --item-dragon: #8a2be2; --item-crown: #ffd700; --item-clock: #00ced1;
            --admin-red: #ff3333; --admin-orange: #ff9933;
        }
        body.theme-default { --primary-dark: #0a0e27; --accent-blue: #00d4ff; --accent-green: #00ff88; --accent-pink: #ff006e; --accent-purple: #7c3aed; }
        body.theme-neon { --primary-dark: #000000; --accent-blue: #00ffff; --accent-green: #00ff00; --accent-pink: #ff00ff; --accent-purple: #aa00ff; }
        body.theme-classic { --primary-dark: #1a1a2e; --accent-blue: #4a90e2; --accent-green: #50c878; --accent-pink: #ff6b6b; --accent-purple: #9b59b6; }
        body.theme-dot { --primary-dark: #000000; --accent-blue: #00ff00; --accent-green: #ffff00; --accent-pink: #ff00ff; --accent-purple: #00ffff; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 4px 4px; }
        body.theme-oldclassic { --primary-dark: #2f4f4f; --accent-blue: #4682b4; --accent-green: #32cd32; --accent-pink: #ff6347; --accent-purple: #9370db; }
        body.theme-white { --primary-dark: #ffffff; --accent-blue: #0000ff; --accent-green: #008000; --accent-pink: #ff1493; --accent-purple: #800080; --text-white: #000000; --text-gray: #666666; }
        body.color-default { --accent-blue: #00d4ff; --accent-green: #00ff88; --accent-pink: #ff006e; --accent-purple: #7c3aed; }
        body.color-red { --accent-blue: #ff5555; --accent-green: #ff7777; --accent-pink: #ff0000; --accent-purple: #ff4444; }
        body.color-cyan { --accent-blue: #00ffff; --accent-green: #00ffff; --accent-pink: #00ffff; --accent-purple: #00ffff; }
        body.color-yellow { --accent-blue: #ffff00; --accent-green: #ffff00; --accent-pink: #ffff00; --accent-purple: #ffff00; }
        body.color-magenta { --accent-blue: #ff00ff; --accent-green: #ff00ff; --accent-pink: #ff00ff; --accent-purple: #ff00ff; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--primary-dark) 0%, #1a0033 100%); color: var(--text-white); height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
        .game-container { width: 100%; height: 100vh; display: flex; flex-direction: column; background: radial-gradient(circle at 20% 50%, rgba(124,58,237,0.1) 0%, transparent 50%); position: relative; }
        /* サービス終了オーバーレイ */
        .service-ended-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(8px);
            pointer-events: auto;
        }
        .service-ended-message {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #2a1e3a, #1a0e2a);
            border: 3px solid var(--accent-pink);
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(255, 0, 110, 0.5);
            animation: fadeInScale 0.5s ease-out;
        }
        .service-ended-message h1 {
            font-size: 64px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .service-ended-message p {
            font-size: 24px;
            color: var(--text-gray);
            margin-bottom: 30px;
        }
        .service-ended-message .goodbye-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        /* 既存のスタイルは維持 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(0,212,255,0.2); background: rgba(10,14,39,0.95); position: relative; }
        .game-title { font-size: 28px; font-weight: 700; background: linear-gradient(90deg, var(--accent-blue), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        .debug-corner { position: absolute; top: 20px; left: 20px; display: flex; gap: 5px; }
        .debug-corner .icon-btn { width: 35px; height: 35px; font-size: 16px; }
        .header-right { display: flex; align-items: center; gap: 20px; margin-left: auto; }
        .level-display { display: flex; flex-direction: column; gap: 5px; background: rgba(0,212,255,0.1); padding: 12px 20px; border-radius: 8px; }
        .level-value { font-size: 20px; font-weight: 700; color: var(--accent-blue); }
        .xp-bar { width: 150px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); transition: width 0.3s; }
        .top-buttons { display: flex; gap: 10px; position: relative; }
        .icon-btn { width: 45px; height: 45px; border: 1px solid rgba(0,212,255,0.3); background: rgba(0,212,255,0.05); color: var(--accent-blue); cursor: pointer; border-radius: 8px; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; position: relative; }
        .icon-btn:hover { background: rgba(0,212,255,0.15); transform: scale(1.05); }
        .icon-btn.disabled { opacity: 0.3; pointer-events: none; }
        .gift-badge { position: absolute; top: -5px; right: -5px; background: var(--accent-pink); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--primary-dark); }
        .coin-display { position: absolute; bottom: 40px; left: 40px; display: flex; align-items: center; gap: 10px; background: rgba(0,255,136,0.1); padding: 12px 20px; border-radius: 8px; font-size: 18px; font-weight: 600; z-index: 10; }
        .coin-value { color: var(--accent-green); }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; overflow-y: auto; }
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; justify-content: flex-start; gap: 30px; padding: 20px 0; }
        .screen.active { display: flex; }
        .menu-title { font-size: 48px; font-weight: 800; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green), var(--accent-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .menu-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 800px; margin: 0 auto; }
        .menu-btn { padding: 25px; border: 2px solid rgba(0,212,255,0.3); background: linear-gradient(135deg, rgba(0,212,255,0.1) 0%, rgba(124,58,237,0.1) 100%); color: var(--text-white); cursor: pointer; border-radius: 12px; font-size: 16px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: all 0.3s; }
        .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,212,255,0.2); }
        .menu-btn .icon { font-size: 32px; }
        .menu-btn.small { padding: 20px; }
        .menu-btn.disabled-btn { opacity: 0.5; filter: grayscale(0.3); pointer-events: none; cursor: not-allowed; }
        .menu-row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
        .difficulty-btn { padding: 25px 40px; border: 2px solid transparent; background: rgba(26,31,58,0.5); color: var(--text-white); cursor: pointer; border-radius: 10px; font-size: 16px; font-weight: 600; transition: all 0.3s; }
        .difficulty-btn.easy { border-color: var(--accent-green); color: var(--accent-green); }
        .difficulty-btn.normal { border-color: var(--accent-blue); color: var(--accent-blue); }
        .difficulty-btn.hard { border-color: var(--accent-pink); color: var(--accent-pink); }
        .game-stats { display: flex; gap: 50px; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 14px; color: var(--text-gray); text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 42px; font-weight: 700; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .timer { font-size: 56px; font-weight: 800; color: var(--accent-pink); font-variant-numeric: tabular-nums; }
        .current-question { font-size: 48px; font-weight: 600; color: var(--accent-blue); text-align: center; font-family: 'Hiragino Maru Gothic', 'Yu Gothic', serif; }
        .romaji-display { font-size: 32px; color: var(--accent-green); font-family: 'Courier New', monospace; text-transform: lowercase; letter-spacing: 3px; }
        .romaji-typed { color: var(--accent-blue); font-weight: bold; }
        .romaji-remaining { color: var(--text-gray); }
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        .overlay.active { display: block; }
        .side-panel { position: fixed; top: 0; right: -500px; width: 500px; height: 100%; background: linear-gradient(135deg, rgba(26,31,58,0.98) 0%, rgba(10,14,39,0.98) 100%); border-left: 1px solid rgba(0,212,255,0.3); overflow-y: auto; transition: right 0.4s ease; z-index: 1000; padding: 30px 20px; box-shadow: -5px 0 30px rgba(0,0,0,0.5); }
        .side-panel.active { right: 0; }
        .panel-header { font-size: 20px; font-weight: 700; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid rgba(0,212,255,0.3); display: flex; justify-content: space-between; align-items: center; }
        .panel-close { background: none; border: none; color: var(--accent-blue); font-size: 24px; cursor: pointer; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(0,212,255,0.2); flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-gray); cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; }
        .tab-btn.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }
        .profile-section { margin-bottom: 30px; }
        .user-name { font-size: 24px; font-weight: 700; color: var(--accent-blue); margin-bottom: 5px; }
        .user-id { font-size: 12px; color: var(--text-gray); margin-bottom: 20px; }
        .change-name-input { width: 100%; padding: 10px 12px; background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); border-radius: 6px; color: var(--text-white); font-size: 14px; margin-bottom: 10px; }
        .change-name-btn { width: 100%; padding: 10px; background: rgba(0,212,255,0.2); border: 1px solid rgba(0,212,255,0.5); border-radius: 6px; color: var(--accent-blue); cursor: pointer; font-weight: 600; margin-bottom: 15px; }
        .name-change-count { font-size: 12px; color: var(--text-gray); margin-bottom: 15px; }
        .back-btn { padding: 12px 24px; border: 1px solid rgba(0,212,255,0.3); background: rgba(0,212,255,0.05); color: var(--accent-blue); cursor: pointer; border-radius: 8px; font-weight: 600; }
        .ranking-mode-btn { padding: 25px 40px; border: 2px solid rgba(0,212,255,0.3); border-radius: 10px; background: linear-gradient(135deg, rgba(0,212,255,0.1) 0%, rgba(124,58,237,0.1) 100%); color: var(--text-white); font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; width: 300px; }
        .ranking-list { width: 100%; max-width: 600px; max-height: 400px; overflow-y: auto; background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2); border-radius: 8px; padding: 20px; }
        .ranking-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0,212,255,0.1); }
        .ranking-rank { font-weight: 700; color: var(--accent-blue); min-width: 40px; }
        .ranking-name { flex: 1; color: var(--text-white); margin: 0 20px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ranking-score { font-weight: 600; color: var(--accent-green); }
        .gift-dialog { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: linear-gradient(135deg,#2a1e3a,#1a0e2a); border: 2px solid var(--accent-gold); border-radius: 20px; padding: 40px; z-index: 2000; display: none; flex-direction: column; align-items: center; gap: 20px; max-width: 500px; width: 90%; }
        .gift-dialog.active { display: flex; }
        .gift-title { font-size: 32px; font-weight: 700; color: var(--accent-gold); }
        .gift-button { padding: 15px 40px; background: linear-gradient(90deg,#ffd700,#ffa500); border: none; border-radius: 10px; color: var(--primary-dark); font-size: 20px; font-weight: 700; cursor: pointer; }
        .gift-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-gray); font-size: 24px; cursor: pointer; }
        .ranking-update-timer { font-size: 14px; color: var(--accent-green); background: rgba(0,255,136,0.1); padding: 8px 20px; border-radius: 40px; }
        .hidden { display: none !important; }
        /* その他スタイルは省略（元のコードと同様）... 全ての要素を保持 */
        .story-map { display: grid; grid-template-columns: repeat(10,1fr); gap: 8px; max-width: 900px; max-height: 500px; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 20px; }
        .story-node { aspect-ratio: 1/1; background: rgba(0,212,255,0.1); border: 2px solid var(--accent-blue); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .story-node.clear { background: rgba(0,255,136,0.2); border-color: var(--accent-green); }
        .story-node.current { border-color: var(--accent-gold); transform: scale(1.05); box-shadow: 0 0 20px gold; }
        .story-node.locked { opacity: 0.3; border-color: gray; cursor: not-allowed; }
        .story-info { background: rgba(0,0,0,0.5); padding: 10px 30px; border-radius: 40px; font-size: 20px; }
        .darkness-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: black; opacity:0; pointer-events: none; transition: opacity 0.5s; z-index: 10000; }
        .darkness-overlay.active { opacity:1; }
        .screen-crack { position: fixed; top:0; left:0; width:100%; height:100%; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.7"><path d="M20 20 L40 80 L70 30 L90 70" stroke="%23ff4444" stroke-width="8" fill="none"/><path d="M10 90 L50 10 L80 90" stroke="%23ffaa00" stroke-width="10" fill="none"/></svg>') center/cover; opacity:0; pointer-events: none; transition: opacity 1s; z-index: 10001; }
        .screen-crack.active { opacity:1; }
        .item-grid { display: flex; flex-direction: column; gap: 12px; max-height: 500px; overflow-y: auto; padding-right: 5px; }
        .item-card { background: rgba(0,212,255,0.05); padding: 15px; border-radius: 8px; border: 1px solid rgba(0,212,255,0.2); display: flex; align-items: center; justify-content: space-between; }
        .item-card.skill { border-color: var(--accent-purple); }
        .item-info { display: flex; flex-direction: column; gap: 4px; }
        .item-name { font-weight: 600; color: var(--accent-blue); }
        .item-desc { font-size: 12px; color: var(--text-gray); }
        .item-count { color: var(--accent-green); font-weight: 600; }
        .equip-btn { padding: 6px 12px; background: rgba(0,212,255,0.2); border: none; border-radius: 4px; color: var(--accent-blue); cursor: pointer; font-size: 12px; }
        .shop-item { background: rgba(124,58,237,0.1); border: 1px solid var(--accent-purple); padding: 20px; border-radius: 8px; }
        .shop-price { color: var(--accent-gold); font-weight: 700; }
        .firebase-status { position: fixed; bottom: 10px; right: 10px; padding: 10px 16px; font-size: 12px; border-radius: 6px; z-index: 999; }
        .firebase-status.connected { background: rgba(0,255,136,0.25); color: var(--accent-green); }
        .bar-game-container { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 20000; }
        .bar-game { width: 600px; height: 80px; background: #333; border-radius: 40px; position: relative; cursor: pointer; overflow: hidden; }
        .bar-fill { height: 100%; width: 10%; background: linear-gradient(90deg, cyan, blue); border-radius: 40px; transition: width 0.05s; }
        .bar-marker { position: absolute; top: -15px; width: 4px; height: 110px; background: white; left: 0; box-shadow: 0 0 10px white; }
        .bar-zones { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; }
        .zone { height:100%; border-right: 2px solid rgba(255,255,255,0.3); }
        .zone-label { position: absolute; bottom: -25px; color: white; font-size: 12px; transform: translateX(-50%); }
        .stop-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 40px; background: var(--accent-pink); border: none; border-radius: 40px; color: white; font-size: 20px; font-weight: 700; cursor: pointer; z-index: 20001; }
        .story-goal-bar { width: 80%; max-width: 600px; height: 20px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 10px; position: relative; }
        .story-goal-fill { height: 100%; background: linear-gradient(90deg, gold, orange); border-radius: 10px; transition: width 0.2s; }
        .story-goal-text { position: absolute; top: 0; left: 50%; transform: translateX(-50%); color: white; font-size: 12px; text-shadow: 1px 1px 2px black; }
        @keyframes skillPop { 0% { scale:0; opacity:0; } 100% { scale:1; opacity:1; } }
        .skill-animation { position: fixed; top:50%; left:50%; transform:translate(-50%,-50%); background: rgba(124,58,237,0.9); padding:30px 60px; border-radius:60px; font-size:48px; color:white; z-index:20000; animation: skillPop 0.5s forwards; }
        .task-item { background: rgba(0,212,255,0.07); border-left: 4px solid var(--accent-blue); padding: 18px; border-radius: 12px; margin-bottom: 15px; }
        .task-item.completed { opacity: 0.7; border-left-color: var(--accent-green); background: rgba(0,255,136,0.05); }
        .task-title { font-size: 16px; font-weight: 600; color: var(--text-white); margin-bottom: 8px; }
        .task-progress { font-size: 14px; color: var(--text-gray); margin-bottom: 8px; }
        .task-progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; }
        .task-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); transition: width 0.3s; }
        .task-reward { margin-top: 10px; font-size: 14px; color: var(--accent-gold); font-weight: 600; }
        .task-notify { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, gold, orange); color: black; padding: 16px 32px; border-radius: 60px; font-weight: 700; z-index: 3000; animation: fadeInOut 3s forwards; pointer-events: none; }
        @keyframes fadeInOut { 0% { opacity:0; top:0; } 15% { opacity:1; top:20px; } 85% { opacity:1; top:20px; } 100% { opacity:0; top:0; } }
        .skill-bar { position: fixed; bottom: 120px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .skill-use-btn { padding: 12px 24px; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); border: none; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; box-shadow: 0 0 20px var(--accent-purple); transition: 0.2s; position: relative; overflow: hidden; }
        .skill-use-btn:hover { transform: scale(1.05); }
        .skill-use-btn.disabled { opacity: 0.4; pointer-events: none; }
        .cooldown-overlay { position: absolute; top:0; left:0; height:100%; background: rgba(0,0,0,0.6); border-radius: 40px; pointer-events: none; }
        .cooldown-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px black; z-index: 2; }
        .admin-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: linear-gradient(135deg, #1a1a2e, #16213e); border: 3px solid var(--admin-red); border-radius: 20px; padding: 30px; z-index: 10000; display: none; flex-direction: column; gap: 20px; min-width: 400px; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .admin-panel.active { display: flex; }
        .admin-title { font-size: 24px; color: var(--admin-red); text-align: center; }
        .admin-subtitle { font-size: 18px; color: var(--admin-orange); margin-top: 10px; }
        .admin-warning { color: #ff8888; font-size: 14px; text-align: center; padding: 10px; background: rgba(255,0,0,0.2); border-radius: 8px; margin-bottom: 10px; }
        .admin-input { padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid var(--admin-red); border-radius: 8px; color: white; font-size: 14px; width: 100%; }
        .admin-btn { padding: 10px; background: linear-gradient(135deg, var(--admin-red), #aa0000); border: none; border-radius: 8px; color: white; font-weight: 700; cursor: pointer; }

<script type="module">
    // サービス終了処理: すべての操作を無効化し、何もできないようにする
    (function() {
        // 全クリックイベントをキャプチャしてブロック
        const blockAllClicks = (e) => {
            e.stopPropagation();
            e.preventDefault();
            return false;
        };
        
        // すべてのボタンやクリック可能な要素を無効化
        const disableAllInteractions = () => {
            const allInteractive = document.querySelectorAll('button, .menu-btn, .icon-btn, .difficulty-btn, .back-btn, .ranking-mode-btn, .equip-btn, .claim-btn, .skill-use-btn, .admin-btn, .gift-button, .change-name-btn, .panel-close, .tab-btn, .season-pass-close, .stop-btn, .factory-claim-btn, .login-bonus-btn');
            allInteractive.forEach(el => {
                el.style.pointerEvents = 'none';
                el.style.opacity = '0.5';
                el.disabled = true;
                el.classList.add('disabled');
            });
            
            // キーボード入力もブロック
            document.addEventListener('keydown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            
            // タッチイベントもブロック
            document.addEventListener('touchstart', (e) => {
                e.preventDefault();
                return false;
            }, true);
            
            // マウスイベントもブロック
            document.addEventListener('mousedown', (e) => {
                e.preventDefault();
                return false;
            }, true);
            
            // オーバーレイにクリックを伝搬させない
            const overlay = document.getElementById('serviceEndedOverlay');
            if (overlay) {
                overlay.addEventListener('click', (e) => {
                    e.stopPropagation();
                });
                overlay.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                });
            }
        };
        
        // 全てのスクリーン切り替えを無効化
        const disableScreenSwitch = () => {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(screen => {
                screen.classList.remove('active');
            });
            // メニュー画面だけ表示するが、ボタンは全て無効化されているので操作不可
            const menuScreen = document.getElementById('menuScreen');
            if (menuScreen) menuScreen.classList.add('active');
        };
        
        // 既存のゲームループやタイマーを停止
        const stopAllGameLoops = () => {
            if (window.gameTimer) clearInterval(window.gameTimer);
            if (window.autoInterval) clearInterval(window.autoInterval);
            if (window.tapInterval) clearInterval(window.tapInterval);
            window.gameActive = false;
        };
        
        // Firebaseからのデータ読み込みも抑制（既存のfirebase参照を無効化）
        const suppressFirebase = () => {
            // 既存のdb参照をオーバーライド
            if (window.db) {
                window.db = null;
            }
            console.log('Firebase interactions disabled');
        };
        
        // 実行
        disableAllInteractions();
        disableScreenSwitch();
        stopAllGameLoops();
        suppressFirebase();
        
        // 追加: 既存のゲーム状態変数をロック
        if (window.gameState) {
            window.gameState = { ...window.gameState, serviceEnded: true };
        }
    })();
</script>
</body>
</html>
