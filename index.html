<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Typing Game</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI','Meiryo',sans-serif; }
body { background-color: #f0f4f8; color:#333; overflow:hidden; width:100vw; height:100vh;}
.hidden { display:none !important; }

/* HUD */
#hud-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#coin-display{position:absolute;bottom:20px;left:20px;background:#fff;padding:12px 25px;border-radius:50px;font-size:24px;font-weight:bold;box-shadow:0 4px 15px rgba(0,0,0,.1);pointer-events:auto;}
#top-right-controls{position:absolute;top:20px;right:20px;display:flex;flex-direction:column;align-items:flex-end;gap:12px;pointer-events:auto;}
#level-display{background:#fff;padding:15px;border-radius:15px;width:280px;box-shadow:0 4px 15px rgba(0,0,0,.1);}
.level-text{font-size:18px;font-weight:bold;margin-bottom:8px;color:#007BFF;}
.xp-bar-container{width:100%;height:12px;background:#e0e0e0;border-radius:6px;overflow:hidden;}
#xp-bar-fill{width:0%;height:100%;background:linear-gradient(90deg,#4CAF50,#8BC34A);transition:.5s;}

/* buttons */
button{padding:12px 24px;border:none;border-radius:8px;background:#007BFF;color:white;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 6px rgba(0,123,255,.2);transition:.2s;}
button:hover:not(:disabled){background:#0056b3;transform:translateY(-2px);}
button:disabled{background:#bdc3c7;color:#7f8c8d;cursor:not-allowed;}

/* menu */
#main-menu,#game-screen,#result-screen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:90%;max-width:800px;}
.menu-buttons{display:flex;flex-direction:column;gap:18px;align-items:center;}
.menu-buttons button,.difficulty-button{width:350px;font-size:20px;padding:18px;}

#typing-area{margin-top:30px;background:white;padding:50px;border-radius:25px;box-shadow:0 15px 35px rgba(0,0,0,.1);}
#japanese-word{font-size:56px;margin-bottom:15px;font-weight:bold;}
#romaji-word{font-size:40px;letter-spacing:4px;font-family:'Courier New',monospace;}
.typed{color:#d1d1d1;}
.untyped{color:#333;}

.side-panel{position:fixed;top:0;right:0;width:80%;max-width:500px;height:100vh;background:white;z-index:100;padding:30px;overflow-y:auto;transform:translateX(100%);transition:.4s;}
.side-panel.open{transform:translateX(0);}
#dark-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.5);z-index:90;}

#notification-area{position:fixed;top:25px;left:50%;transform:translateX(-50%);z-index:1000;}
.notification{background:#333;color:white;padding:15px 35px;border-radius:10px;margin-bottom:10px;animation:slideDown .5s forwards;}
@keyframes slideDown{from{transform:translateY(-50px);opacity:0;}to{transform:translateY(0);opacity:1;}}
</style>
</head>

<body>

<div id="hud-container">
<div id="coin-display">🪙 <span id="coin-value">0</span></div>

<div id="top-right-controls">
<div id="level-display">
<div class="level-text">Level: <span id="current-level">1</span></div>
<div class="xp-bar-container"><div id="xp-bar-fill"></div></div>
<div><span id="current-xp">0</span>/<span id="required-xp">100</span> XP</div>
</div>

<button id="profile-button">👤 プロフィール</button>
<button id="task-button">📋 タスク</button>
<button id="inventory-button">🎒 アイテム</button>
</div>
</div>

<div id="dark-overlay" class="hidden"></div>

<div id="main-menu">
<h1>TYPING ONLINE</h1>

<div class="menu-buttons">
<button id="offline-menu-button">一人でプレイ</button>
</div>

<div id="difficulty-selection" class="hidden">
<h2>難易度</h2>
<button class="difficulty-button" data-difficulty="easy">EASY</button>
<button class="difficulty-button" data-difficulty="normal">NORMAL</button>
<button class="difficulty-button" data-difficulty="hard">HARD</button>
<button id="cancel-offline-button">戻る</button>
</div>
</div>

<div id="game-screen" class="hidden">
<div>TIME: <span id="time-left">60</span></div>
<div>SCORE: <span id="current-score">0</span></div>
<div>COMBO: <span id="current-combo">0</span></div>

<div id="typing-area">
<div id="japanese-word"></div>
<div id="romaji-word"></div>
</div>
</div>

<div id="result-screen" class="hidden">
<h2>RESULT</h2>
<p>SCORE: <span id="final-score">0</span></p>
<button id="return-to-menu-button">メニュー</button>
</div>

<div id="notification-area"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

/* Firebase */
const firebaseConfig={
apiKey:"AIzaSyBXnNXQ5khcR0EvRide4C0PjshJZpSF4oM",
authDomain:"typing-game-28ed0.firebaseapp.com",
databaseURL:"https://typing-game-28ed0-default-rtdb.firebaseio.com",
projectId:"typing-game-28ed0",
storageBucket:"typing-game-28ed0.firebasestorage.app",
messagingSenderId:"963797267101",
appId:"1:963797267101:web:0d5d700458fb1991021a74",
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

/* state */
const UserState={uid:null,coins:0,level:1,xp:0};
let gameActive=false,score=0,combo=0,timeLeft=60,timer=null;
let currentWord=null,charIdx=0,activeDiff="easy";

const WordDB={
easy:[{t:"ねこ",r:"neko"},{t:"いぬ",r:"inu"}],
normal:[{t:"にほんご",r:"nihongo"}],
hard:[{t:"じんこうちのう",r:"jinkouchinou"}]
};

/* UI */
function updateHUD(){
document.getElementById("coin-value").innerText=UserState.coins;
document.getElementById("current-level").innerText=UserState.level;
}

/* game */
function startTyping(diff){
activeDiff=diff;
document.getElementById("main-menu").classList.add("hidden");
document.getElementById("game-screen").classList.remove("hidden");

score=0;combo=0;timeLeft=60;gameActive=true;

setNextWord();

timer=setInterval(()=>{
timeLeft--;
document.getElementById("time-left").innerText=timeLeft;
if(timeLeft<=0)endGame();
},1000);
}

function setNextWord(){
const list=WordDB[activeDiff];
currentWord=list[Math.floor(Math.random()*list.length)];
charIdx=0;
renderWord();
}

function renderWord(){
document.getElementById("japanese-word").innerText=currentWord.t;
document.getElementById("romaji-word").innerHTML=currentWord.r.split('').map((c,i)=>
`<span class="${i<charIdx?'typed':'untyped'}">${c}</span>`).join('');
}

function endGame(){
gameActive=false;
clearInterval(timer);

document.getElementById("game-screen").classList.add("hidden");
document.getElementById("result-screen").classList.remove("hidden");

document.getElementById("final-score").innerText=score;
}

/* events */
document.getElementById("offline-menu-button").onclick=()=>{
document.getElementById("difficulty-selection").classList.remove("hidden");
};

document.getElementById("cancel-offline-button").onclick=()=>{
document.getElementById("difficulty-selection").classList.add("hidden");
};

document.querySelectorAll(".difficulty-button").forEach(btn=>{
btn.onclick=()=>startTyping(btn.dataset.difficulty);
});

document.getElementById("return-to-menu-button").onclick=()=>{
document.getElementById("result-screen").classList.add("hidden");
document.getElementById("main-menu").classList.remove("hidden");
};

window.onkeydown=(e)=>{
if(!gameActive||e.repeat)return;

const target=currentWord.r[charIdx];
if(e.key===target){
charIdx++;
combo++;
score+=10*combo;

if(charIdx>=currentWord.r.length)setNextWord();
else renderWord();
}
};

/* auth */
onAuthStateChanged(auth,async(user)=>{
if(user){
UserState.uid=user.uid;
updateHUD();
}else{
signInAnonymously(auth);
}
});

</script>
</body>
</html>
